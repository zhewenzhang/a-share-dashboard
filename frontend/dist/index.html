<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A 股资金追踪系统 | Capital Flow Dashboard</title>
    <meta name="description" content="专业的 A 股资金流向追踪系统，基于 TuShare 数据实时监控股市资金动向">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(30, 41, 59, 0.6);
            --bg-card-hover: rgba(51, 65, 85, 0.8);
            --border-color: rgba(148, 163, 184, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --bull-red: #ef4444;
            --bear-green: #22c55e;
            --gradient-bull: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            --gradient-bear: linear-gradient(135deg, #22c55e 0%, #10b981 100%);
            --gradient-accent: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.15);
            --glow-red: 0 0 30px rgba(239, 68, 68, 0.3);
            --glow-green: 0 0 30px rgba(34, 197, 94, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(148, 163, 184, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 24px 32px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: var(--gradient-accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-glow);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f8fafc 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(139, 92, 246, 0.15);
            border-radius: 20px;
            font-size: 12px;
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.3);
            margin-left: 12px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .update-time {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .update-time .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .btn-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--gradient-accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        .btn-refresh .icon {
            font-size: 16px;
            transition: transform 0.5s ease;
        }

        .btn-refresh:hover .icon {
            transform: rotate(180deg);
        }

        /* 指数卡片网格 */
        .indices-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .index-card {
            position: relative;
            padding: 28px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .index-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-accent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .index-card:hover {
            transform: translateY(-4px);
            background: var(--bg-card-hover);
            box-shadow: var(--shadow-glow);
        }

        .index-card:hover::before {
            opacity: 1;
        }

        .index-card.bull::before {
            background: var(--gradient-bull);
        }

        .index-card.bear::before {
            background: var(--gradient-bear);
        }

        .index-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .index-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .index-icon {
            font-size: 18px;
        }

        .index-badge {
            padding: 4px 10px;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .index-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .index-change {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 600;
        }

        .change-value {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
        }

        .change-value.bull {
            color: var(--bull-red);
            background: rgba(239, 68, 68, 0.1);
        }

        .change-value.bear {
            color: var(--bear-green);
            background: rgba(34, 197, 94, 0.1);
        }

        .change-arrow {
            font-size: 14px;
        }

        .change-percent {
            padding: 6px 12px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .change-percent.bull {
            color: var(--bull-red);
            background: rgba(239, 68, 68, 0.1);
        }

        .change-percent.bear {
            color: var(--bear-green);
            background: rgba(34, 197, 94, 0.1);
        }

        /* 板块排行 */
        .section-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            padding: 28px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .section-card:hover {
            background: var(--bg-card-hover);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .section-icon {
            font-size: 22px;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chart-container {
            height: 350px;
        }

        /* 推荐股票表格 */
        .stock-table {
            width: 100%;
            border-collapse: collapse;
        }

        .stock-table th {
            padding: 16px 28px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(148, 163, 184, 0.05);
            border-bottom: 1px solid var(--border-color);
        }

        .stock-table td {
            padding: 20px 28px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.05);
            transition: all 0.2s ease;
        }

        .stock-table tr {
            transition: all 0.2s ease;
        }

        .stock-table tbody tr:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        .stock-name {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stock-name-cn {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
        }

        .stock-code {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .stock-price {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stock-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .stock-change.bull {
            color: var(--bull-red);
            background: rgba(239, 68, 68, 0.1);
        }

        .stock-change.bear {
            color: var(--bear-green);
            background: rgba(34, 197, 94, 0.1);
        }

        .stock-score {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .score-bar {
            width: 100px;
            height: 8px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .score-fill.high {
            background: linear-gradient(90deg, #22c55e, #10b981);
        }

        .score-fill.medium {
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
        }

        .score-fill.low {
            background: linear-gradient(90deg, #ef4444, #dc2626);
        }

        .stock-industry {
            padding: 6px 12px;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            display: inline-block;
        }

        .rec-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .rec-tag.strong-buy {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.4);
        }

        .rec-tag.buy {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .rec-tag.watch {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.4);
        }

        /* 状态提示 */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .status-icon {
            font-size: 20px;
        }

        .status-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .status-text strong {
            color: var(--text-primary);
        }

        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 1400px) {
            .indices-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 1024px) {
            .container {
                padding: 16px;
            }
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            .header-left {
                flex-direction: column;
                gap: 12px;
            }
            .indices-grid {
                grid-template-columns: 1fr;
            }
            .stock-table {
                font-size: 13px;
            }
            .stock-table th,
            .stock-table td {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">📊</div>
                <div>
                    <h1>A 股资金追踪系统</h1>
                    <div class="header-subtitle">Capital Flow Dashboard</div>
                </div>
                <span class="header-badge">🚀 v1.0.0</span>
            </div>
            <div class="header-right">
                <div class="update-time">
                    <span class="dot"></span>
                    <span>更新于 <span id="updateTime">--:--:--</span></span>
                </div>
                <button class="btn-refresh" onclick="refreshData()">
                    <span class="icon">🔄</span>
                    <span>刷新数据</span>
                </button>
            </div>
        </header>

        <!-- 状态栏 -->
        <div class="status-bar" id="statusBar">
            <span class="status-icon">ℹ️</span>
            <span class="status-text">正在加载数据...</span>
        </div>

        <!-- 主要指数 -->
        <div class="indices-grid" id="indicesGrid">
            <div class="loading"><div class="spinner"></div></div>
        </div>

        <!-- 板块资金流向 -->
        <div class="section-card">
            <div class="section-header">
                <div class="section-title">
                    <span class="section-icon">🔥</span>
                    板块资金流向 TOP10
                </div>
            </div>
            <div id="sectorChart" class="chart-container"></div>
        </div>

        <!-- 智能推荐 -->
        <div class="section-card">
            <div class="section-header">
                <div class="section-title">
                    <span class="section-icon">⭐</span>
                    资金强度推荐
                </div>
            </div>
            <table class="stock-table">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>股票名称</th>
                        <th>最新价</th>
                        <th>涨跌幅</th>
                        <th>资金强度</th>
                        <th>主力净流入</th>
                        <th>连续流入</th>
                        <th>所属行业</th>
                        <th>建议</th>
                    </tr>
                </thead>
                <tbody id="recommendTable">
                    <tr>
                        <td colspan="9" class="loading">
                            <div class="spinner"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // API 配置
        const API_BASE = '';  // 同源代理
        const USE_MOCK_DATA = false;  // 是否使用模拟数据

        // 格式化数字
        function formatNumber(num) {
            return num.toLocaleString('zh-CN');
        }

        function formatPercent(num) {
            const sign = num >= 0 ? '+' : '';
            return sign + num.toFixed(2) + '%';
        }

        function formatAmount(num) {
            if (Math.abs(num) >= 10000) {
                return (num / 10000).toFixed(2) + '亿';
            }
            return num.toFixed(2) + '万';
        }

        // 更新时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('updateTime').textContent = timeStr;
        }

        // 显示状态
        function showStatus(message, type = 'info') {
            const statusBar = document.getElementById('statusBar');
            const icons = { info: 'ℹ️', success: '✅', error: '❌', warning: '⚠️' };
            statusBar.innerHTML = `
                <span class="status-icon">${icons[type] || 'ℹ️'}</span>
                <span class="status-text">${message}</span>
            `;
            statusBar.style.background = type === 'error' ? 'rgba(239, 68, 68, 0.1)' : 'rgba(59, 130, 246, 0.1)';
            statusBar.style.borderColor = type === 'error' ? 'rgba(239, 68, 68, 0.2)' : 'rgba(59, 130, 246, 0.2)';
        }

        // 获取指数数据
        async function fetchIndices() {
            try {
                const response = await fetch(`${API_BASE}/api/indices`);
                const result = await response.json();
                return result.data || [];
            } catch (error) {
                console.error('获取指数数据失败:', error);
                return getMockIndices();
            }
        }

        // 获取板块资金流向
        async function fetchSectorFlow() {
            try {
                const response = await fetch(`${API_BASE}/api/sectors/flow`);
                const result = await response.json();
                return result.data || [];
            } catch (error) {
                console.error('获取板块数据失败:', error);
                return getMockSectorFlow();
            }
        }

        // 获取推荐股票
        async function fetchRecommendations() {
            try {
                const response = await fetch(`${API_BASE}/api/recommendations?top_n=20`);
                const result = await response.json();
                return result.data || [];
            } catch (error) {
                console.error('获取推荐数据失败:', error);
                return getMockRecommendations();
            }
        }

        // 渲染指数
        function renderIndices(indices) {
            const grid = document.getElementById('indicesGrid');
            const iconMap = {
                '上证指数': '📊',
                '深证成指': '📈',
                '创业板指': '🚀',
                '沪深 300': '💎'
            };
            const codeMap = {
                '上证指数': 'SH000001',
                '深证成指': 'SZ399001',
                '创业板指': 'SZ399006',
                '沪深 300': 'SH000300'
            };

            grid.innerHTML = indices.map((idx, i) => {
                const isBull = idx.change >= 0;
                const icon = iconMap[idx.name] || '📊';
                const code = codeMap[idx.name] || '';
                
                return `
                    <div class="index-card ${isBull ? 'bull' : 'bear'}">
                        <div class="index-header">
                            <div class="index-name">
                                <span class="index-icon">${icon}</span>
                                ${idx.name}
                            </div>
                            <span class="index-badge">${code}</span>
                        </div>
                        <div class="index-value">${formatNumber(idx.point)}</div>
                        <div class="index-change">
                            <span class="change-value ${isBull ? 'bull' : 'bear'}">
                                <span class="change-arrow">${isBull ? '↑' : '↓'}</span>
                                <span>${formatAmount(Math.abs(idx.change))}</span>
                            </span>
                            <span class="change-percent ${isBull ? 'bull' : 'bear'}">
                                ${formatPercent(idx.change_pct)}
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 渲染板块图表
        function renderSectorChart(sectors) {
            const chart = echarts.init(document.getElementById('sectorChart'));
            
            const option = {
                tooltip: { 
                    trigger: 'axis', 
                    axisPointer: { type: 'shadow' },
                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                    borderColor: 'rgba(148, 163, 184, 0.2)',
                    textStyle: { color: '#f8fafc' }
                },
                grid: { 
                    left: '3%', 
                    right: '4%', 
                    bottom: '3%', 
                    top: '3%',
                    containLabel: true 
                },
                xAxis: { 
                    type: 'value', 
                    axisLabel: { 
                        formatter: '{value}万',
                        color: '#94a3b8'
                    },
                    axisLine: { lineStyle: { color: 'rgba(148, 163, 184, 0.2)' } },
                    splitLine: { lineStyle: { color: 'rgba(148, 163, 184, 0.1)' } }
                },
                yAxis: { 
                    type: 'category', 
                    data: sectors.map(d => d.sector_name),
                    axisLabel: { color: '#94a3b8' },
                    axisLine: { lineStyle: { color: 'rgba(148, 163, 184, 0.2)' } }
                },
                series: [{
                    type: 'bar',
                    data: sectors.map(s => ({
                        name: s.sector_name,
                        value: s.net_amount / 10000  // 转换为万
                    })),
                    barWidth: '60%',
                    itemStyle: {
                        borderRadius: [0, 8, 8, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: 'rgba(59, 130, 246, 0.8)' },
                            { offset: 1, color: 'rgba(139, 92, 246, 0.8)' }
                        ])
                    },
                    emphasis: {
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                                { offset: 0, color: 'rgba(59, 130, 246, 1)' },
                                { offset: 1, color: 'rgba(139, 92, 246, 1)' }
                            ])
                        }
                    }
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 渲染推荐表格
        function renderRecommendTable(recommendations) {
            const tbody = document.getElementById('recommendTable');
            
            tbody.innerHTML = recommendations.map((rec, index) => {
                const isBull = rec.change_pct >= 0;
                const isBullInflow = rec.net_amount >= 0;
                const scoreClass = rec.score >= 80 ? 'high' : rec.score >= 60 ? 'medium' : 'low';
                const recTagClass = rec.recommendation_type.toLowerCase().replace('_', '-');
                
                return `
                    <tr>
                        <td><span style="color: var(--text-muted); font-weight: 600;">${index + 1}</span></td>
                        <td>
                            <div class="stock-name">
                                <span class="stock-name-cn">${rec.name}</span>
                                <span class="stock-code">${rec.ts_code}</span>
                            </div>
                        </td>
                        <td>
                            <span class="stock-price">¥${rec.price.toFixed(2)}</span>
                        </td>
                        <td>
                            <span class="stock-change ${isBull ? 'bull' : 'bear'}">
                                ${isBull ? '↑' : '↓'} ${Math.abs(rec.change_pct).toFixed(2)}%
                            </span>
                        </td>
                        <td>
                            <div class="stock-score">
                                <span style="font-weight: 600; color: var(--text-primary);">${rec.score}</span>
                                <div class="score-bar">
                                    <div class="score-fill ${scoreClass}" style="width: ${rec.score}%"></div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="stock-inflow ${isBullInflow ? 'bull' : 'bear'}">
                                ${isBullInflow ? '↑' : '↓'} ${formatAmount(rec.net_amount)}
                            </span>
                        </td>
                        <td>
                            <span style="color: var(--text-secondary);">${rec.continuous_days}天</span>
                        </td>
                        <td>
                            <span class="stock-industry">${rec.industry}</span>
                        </td>
                        <td>
                            <span class="rec-tag ${recTagClass}">${rec.recommendation_type.replace('_', ' ')}</span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 刷新数据
        async function refreshData() {
            const btn = document.querySelector('.btn-refresh');
            btn.disabled = true;
            btn.style.opacity = '0.7';
            
            try {
                updateTime();
                
                // 获取数据
                const [indices, sectors, recommendations] = await Promise.all([
                    fetchIndices(),
                    fetchSectorFlow(),
                    fetchRecommendations()
                ]);
                
                // 渲染
                renderIndices(indices);
                renderSectorChart(sectors);
                renderRecommendTable(recommendations);
                
                showStatus('✅ 数据已更新 - 当前使用模拟数据，配置 TuShare Token 后显示真实数据', 'success');
            } catch (error) {
                console.error('刷新数据失败:', error);
                showStatus('❌ 数据刷新失败，请检查网络连接', 'error');
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {

    </script>
