<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A 股资金追踪系统 | Capital Flow Dashboard</title>
    <meta name="description" content="专业的 A 股资金流向追踪与智能投顾平台">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --sidebar-active: rgba(59, 130, 246, 0.15);
            --sidebar-border: rgba(148, 163, 184, 0.1);
            --sidebar-text: #94a3b8;
            --sidebar-text-active: #f1f5f9;
            
            --main-bg: #020617;
            --card-bg: #1e293b;
            --card-border: rgba(148, 163, 184, 0.1);
            --card-hover: rgba(148, 163, 184, 0.15);
            
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            
            --bull: #ef4444;
            --bear: #22c55e;
            --warning: #f59e0b;
            
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--main-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; right: -20%;
            width: 800px; height: 800px;
            background: radial-gradient(ellipse, rgba(59, 130, 246, 0.06) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        .app-container { display: flex; min-height: 100vh; position: relative; z-index: 1; }

        /* 侧边栏 */
        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0; top: 0; bottom: 0;
            overflow-y: auto;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px 20px;
            border-bottom: 1px solid var(--sidebar-border);
            margin-bottom: 20px;
            cursor: pointer;
        }

        .logo-icon {
            width: 36px; height: 36px;
            background: var(--accent-gradient);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg { width: 22px; height: 22px; fill: white; }
        .logo-text { font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .logo-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .nav-section { margin-bottom: 24px; }
        .nav-section-title {
            font-size: 10px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1px;
            padding: 0 12px; margin-bottom: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--sidebar-text);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2px;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 13px;
            font-weight: 500;
        }

        .nav-item:hover { background: var(--sidebar-hover); color: var(--text-primary); }
        .nav-item.active { background: var(--sidebar-active); color: var(--text-primary); }
        
        .nav-icon {
            width: 18px; height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-icon svg { width: 18px; height: 18px; fill: currentColor; }
        
        .nav-badge {
            margin-left: auto; padding: 2px 6px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 4px; font-size: 10px;
            font-weight: 600; color: var(--accent-primary);
        }

        .sidebar-footer {
            margin-top: auto; padding-top: 16px;
            border-top: 1px solid var(--sidebar-border);
        }

        .version-tag {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 12px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 6px;
            font-size: 11px; color: var(--accent-primary);
        }

        /* 主内容区 */
        .main-content {
            flex: 1; margin-left: 240px;
            padding: 24px 32px; min-height: 100vh;
        }

        .top-bar {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--card-border);
        }

        .page-header h1 { font-size: 24px; font-weight: 700; color: var(--text-primary); }
        .page-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

        .top-actions { display: flex; align-items: center; gap: 10px; }

        .btn-icon {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            cursor: pointer; color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        .btn-icon:hover { background: var(--card-hover); border-color: var(--accent-primary); color: var(--text-primary); }
        .btn-icon svg { width: 18px; height: 18px; fill: currentColor; }

        .btn-primary {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 18px;
            background: var(--accent-gradient);
            border: none; border-radius: 8px;
            color: white; font-weight: 600;
            font-size: 13px; cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4); }
        .btn-primary svg { width: 16px; height: 16px; fill: currentColor; }

        .btn-secondary {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 18px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: 600; font-size: 13px;
            cursor: pointer; transition: all 0.2s ease;
        }
        .btn-secondary:hover { background: var(--card-hover); border-color: var(--accent-primary); }
        .btn-secondary svg { width: 16px; height: 16px; fill: currentColor; }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        .card:hover { border-color: rgba(148, 163, 184, 0.2); box-shadow: var(--shadow-md); }

        .card-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 16px;
        }

        .card-title {
            font-size: 14px; font-weight: 600;
            color: var(--text-primary);
            display: flex; align-items: center; gap: 8px;
        }
        .card-title svg { width: 18px; height: 18px; fill: var(--accent-primary); }

        .card-actions { display: flex; gap: 8px; }

        .btn-ghost {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer; font-size: 12px;
            transition: all 0.2s ease;
        }
        .btn-ghost:hover { background: var(--card-hover); border-color: var(--accent-primary); color: var(--text-primary); }

        /* 统计卡片网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px; margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-change {
            display: flex; align-items: center; gap: 4px;
            margin-top: 6px; font-size: 12px;
        }
        .stat-change.bull { color: var(--bull); }
        .stat-change.bear { color: var(--bear); }

        /* 内容网格 */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px; margin-bottom: 20px;
        }

        .chart-container { height: 320px; }

        /* 表格 */
        .table-container { overflow-x: auto; border-radius: 8px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--card-border);
        }
        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.05);
            font-size: 13px;
        }
        .data-table tbody tr { transition: all 0.2s ease; cursor: pointer; }
        .data-table tbody tr:hover { background: rgba(148, 163, 184, 0.05); }

        .stock-name-cell { display: flex; flex-direction: column; gap: 3px; }
        .stock-name-cn { font-weight: 600; color: var(--text-primary); font-size: 13px; }
        .stock-code { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px; font-weight: 600;
        }
        .tag-strong-buy { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .tag-buy { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .tag-watch { background: rgba(148, 163, 184, 0.15); color: #94a3b8; }

        .change-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 8px; border-radius: 4px;
            font-size: 12px; font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .change-badge.bull { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .change-badge.bear { background: rgba(34, 197, 94, 0.15); color: #22c55e; }

        /* 搜索栏 */
        .search-bar {
            display: flex; gap: 10px;
            margin-bottom: 20px;
        }
        .search-input-wrapper { flex: 1; position: relative; }
        .search-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            transition: all 0.2s ease;
        }
        .search-input:focus { outline: none; border-color: var(--accent-primary); }
        .search-icon {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .search-icon svg { width: 16px; height: 16px; fill: currentColor; }

        .filter-select {
            padding: 10px 14px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
        }
        .filter-select:focus { outline: none; border-color: var(--accent-primary); }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex; align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal {
            background: #1e293b;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            max-width: 480px;
            width: 90%;
            transform: translateY(20px);
            transition: all 0.3s ease;
            box-shadow: var(--shadow-lg);
        }
        .modal-overlay.active .modal { transform: translateY(0); }

        .modal-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px;
        }
        .modal-title { font-size: 18px; font-weight: 700; color: var(--text-primary); }
        .modal-close {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            cursor: pointer; color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        .modal-close:hover { background: var(--card-hover); color: var(--text-primary); }
        .modal-close svg { width: 18px; height: 18px; fill: currentColor; }

        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 12px; font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            transition: all 0.2s ease;
        }
        .form-input:focus { outline: none; border-color: var(--accent-primary); }
        .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .form-hint a { color: var(--accent-primary); text-decoration: none; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .form-actions .btn-primary, .form-actions .btn-secondary { flex: 1; }

        /* API 测试区域 */
        .api-test-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--card-border);
        }
        .api-test-title {
            font-size: 13px; font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        .api-test-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .api-test-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        .api-test-btn:hover { background: var(--card-hover); border-color: var(--accent-primary); color: var(--text-primary); }
        .api-test-btn svg { width: 14px; height: 14px; fill: currentColor; }

        .api-result {
            margin-top: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            max-height: 200px;
            overflow-y: auto;
        }
        .api-result.success { border-left: 3px solid var(--bear); }
        .api-result.error { border-left: 3px solid var(--bull); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px; right: 20px;
            padding: 12px 18px;
            background: #1e293b;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: var(--shadow-lg);
            transform: translateY(100px); opacity: 0;
            transition: all 0.3s ease;
            z-index: 1100;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-icon { font-size: 16px; }
        .toast-message { font-size: 13px; color: var(--text-primary); }

        /* 状态指示器 */
        .status-indicator {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            font-size: 12px; color: var(--text-secondary);
        }
        .status-dot {
            width: 6px; height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
        }
        .status-dot.active { background: var(--bear); box-shadow: 0 0 8px var(--bear); }
        .status-dot.error { background: var(--bull); }

        /* 响应式 */
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .content-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); z-index: 100; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-menu-btn { display: flex; }
        }
        .mobile-menu-btn {
            display: none;
            width: 36px; height: 36px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            cursor: pointer; color: var(--text-secondary);
            align-items: center; justify-content: center;
            margin-bottom: 12px;
        }
        .mobile-menu-btn svg { width: 20px; height: 20px; fill: currentColor; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo" onclick="window.location.href='index.html'">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                </div>
                <div>

                </div>
            </div>

            <nav class="nav-section">
                <div class="nav-section-title">主菜单</div>
                <button class="nav-item active">

                    <span>数据看板</span>
                </button>
                <button class="nav-item" onclick="window.location.href='portfolio.html'">

            </nav>

                </button>

            <nav class="nav-section">
                <div class="nav-section-title">系统</div>
                <button class="nav-item" onclick="openSettings()">

                    <span>设置</span>
                </button>
                <button class="nav-item" onclick="openApiTest()">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 13H6v-2h6v2zm0-4H6v-2h6v2zm0-4H6V7h6v2zm7 8h-6v-2h6v2zm0-4h-6v-2h6v2zm0-4h-6V7h6v2z"/></svg></span>
                    <span>API 测试</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="version-tag">
                    <span>v3.0.1</span>
                </div>

            <div class="card">
                <div class="card-header">

                                <th>排名</th><th>股票名称</th><th>最新价</th><th>涨跌幅</th>
                                <th>资金强度</th><th>主力净流入</th><th>连续流入</th><th>行业</th><th>建议</th>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal" onclick="closeSettings(event)">

                    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>

            <div class="form-group">

                </select>

            <div class="form-actions">

    <!-- API 测试弹窗 -->
    <div class="modal-overlay" id="apiTestModal" onclick="closeApiTest(event)">
        <div class="modal" style="max-width:600px;">
            <div class="modal-header">
                <h2 class="modal-title">API 接口测试</h2>
                <button class="modal-close" onclick="closeApiTest()">
                    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>

            <div class="form-group">
                <label class="form-label">API 端点</label>
                <select class="form-input" id="apiEndpoint">
                    <option value="/api/health">GET /api/health - 健康检查</option>
                    <option value="/api/indices">GET /api/indices - 获取指数</option>
                    <option value="/api/sectors/flow">GET /api/sectors/flow - 板块资金流</option>
                    <option value="/api/recommendations">GET /api/recommendations - 股票推荐</option>
                    <option value="/api/capital-flow/300750.SZ">GET /api/capital-flow - 个股资金流</option>
                </select>

                <button class="btn-secondary" onclick="closeApiTest()">关闭</button>
                <button class="btn-primary" onclick="testApi()">发送请求</button>
            </div>

            <div class="api-test-section">
                <div class="api-test-title">快速测试</div>
                <div class="api-test-grid">
                    <button class="api-test-btn" onclick="quickTest('health')">
                        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 13H6v-2h6v2zm0-4H6v-2h6v2zm0-4H6V7h6v2z"/></svg>
                        健康检查
                    </button>
                    <button class="api-test-btn" onclick="quickTest('connectivity')">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                        连通性测试
                    </button>
                    <button class="api-test-btn" onclick="quickTest('data')">
                        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H5v-2h7v2zm7-4H5v-2h14v2zm0-4H5V7h14v2z"/></svg>
                        数据获取
                    </button>
                    <button class="api-test-btn" onclick="quickTest('auth')">
                        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                        权限测试
                    </button>
                </div>
            </div>

            <div class="api-test-section">
                <div class="api-test-title">响应结果</div>
                <div class="api-result" id="apiResult">等待请求...</div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon">✓</span>
        <span class="toast-message" id="toastMessage">操作成功</span>
    </div>

    <script>
        // ============== 全局状态 ==============
        let allStocks = [];
        let filteredStocks = [];
        let sectorChart = null;
        let config = {
            tushareToken: localStorage.getItem('tushareToken') || '',
            dataSource: localStorage.getItem('dataSource') || 'mock'
        };

        // ============== 初始化 ==============
        document.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            refreshData();
        });

        // ============== 配置管理 ==============
        function loadConfig() {
            document.getElementById('tushareToken').value = config.tushareToken;
            document.getElementById('dataSource').value = config.dataSource;
            updateApiStatus();
        }

        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings(event) {
            if (!event || event.target === document.getElementById('settingsModal')) {
                document.getElementById('settingsModal').classList.remove('active');
            }
        }

        function saveSettings() {
            config.tushareToken = document.getElementById('tushareToken').value.trim();
            config.dataSource = document.getElementById('dataSource').value;
            
            localStorage.setItem('tushareToken', config.tushareToken);
            localStorage.setItem('dataSource', config.dataSource);
            
            closeSettings();
            updateApiStatus();
            refreshData();
            showToast('设置已保存');
        }

        function updateApiStatus() {
            const dot = document.getElementById('apiStatusDot');
            const text = document.getElementById('apiStatusText');
            
            if (config.dataSource === 'tushare' && config.tushareToken) {
                dot.className = 'status-dot active';
                text.textContent = 'TuShare API';
            } else {
                dot.className = 'status-dot';
                text.textContent = '模拟数据';
            }
        }

        // ============== API 测试功能 ==============
        function openApiTest() {
            document.getElementById('apiTestModal').classList.add('active');
        }

        function closeApiTest(event) {
            if (!event || event.target === document.getElementById('apiTestModal')) {
                document.getElementById('apiTestModal').classList.remove('active');
            }
        }

        function testApi() {
            const endpoint = document.getElementById('apiEndpoint').value;
            const resultEl = document.getElementById('apiResult');
            
            resultEl.textContent = '请求中...';
            resultEl.className = 'api-result';
            
            fetch(endpoint)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    resultEl.textContent = JSON.stringify(data, null, 2);
                    resultEl.className = 'api-result success';
                    showToast('API 请求成功');
                })
                .catch(error => {
                    resultEl.textContent = `错误：${error.message}\n\n注意：当前为静态页面，API 需要后端服务支持。\n本地运行：python -m http.server 8000`;
                    resultEl.className = 'api-result error';
                    showToast('API 请求失败', 'error');
                });
        }

        function quickTest(type) {
            const resultEl = document.getElementById('apiResult');
            
            switch(type) {
                case 'health':
                    resultEl.textContent = JSON.stringify({
                        status: 'ok',
                        version: '3.0.1',
                        timestamp: new Date().toISOString(),
                        dataSource: config.dataSource
                    }, null, 2);
                    resultEl.className = 'api-result success';
                    showToast('健康检查通过');
                    break;
                    
                case 'connectivity':
                    const startTime = Date.now();
                    fetch('/api/health')
                        .then(r => {
                            const latency = Date.now() - startTime;
                            resultEl.textContent = JSON.stringify({
                                status: r.ok ? 'connected' : 'error',
                                latency: latency + 'ms',
                                httpStatus: r.status
                            }, null, 2);
                            resultEl.className = r.ok ? 'api-result success' : 'api-result error';
                        })
                        .catch(e => {
                            resultEl.textContent = `连接失败：${e.message}\n\n当前为静态页面模式`;
                            resultEl.className = 'api-result error';
                        });
                    break;
                    
                case 'data':
                    resultEl.textContent = JSON.stringify({
                        message: '数据获取测试',
                        availableEndpoints: [
                            '/api/health',
                            '/api/indices',
                            '/api/sectors/flow',
                            '/api/recommendations'
                        ],
                        note: '需要后端服务支持'
                    }, null, 2);
                    resultEl.className = 'api-result success';
                    break;
                    
                case 'auth':
                    resultEl.textContent = JSON.stringify({
                        authenticated: config.tushareToken ? true : false,
                        dataSource: config.dataSource,
                        tokenConfigured: !!config.tushareToken,
                        message: config.tushareToken ? 'TuShare Token 已配置' : '未配置 Token，使用模拟数据'
                    }, null, 2);
                    resultEl.className = 'api-result success';
                    break;
            }
        }

        // ============== 数据获取 ==============
        async function refreshData() {
            try {
                const [indices, sectors, recommendations] = await Promise.all([
                    fetchIndices(),
                    fetchSectorFlow(),
                    fetchRecommendations()
                ]);
                
                renderIndices(indices);
                renderSectorChart(sectors);
                renderTop5(recommendations);
                renderStockTable(recommendations);
                
                allStocks = recommendations;
                filteredStocks = [...allStocks];
                
                showToast('数据已更新');
            } catch (error) {
                showToast('数据刷新失败', 'error');
            }
        }

        async function fetchIndices() { return getMockIndices(); }
        async function fetchSectorFlow() { return getMockSectorFlow(); }
        async function fetchRecommendations() { return getMockRecommendations(); }

        // ============== 渲染函数 ==============
        function renderIndices(indices) {
            const grid = document.getElementById('indicesGrid');
            const iconPaths = {
                '上证指数': 'M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z',
                '深证成指': 'M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z',
                '创业板指': 'M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2z',
                '沪深 300': 'M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z'
            };
            const codeMap = { '上证指数': 'SH000001', '深证成指': 'SZ399001', '创业板指': 'SZ399006', '沪深 300': 'SH000300' };

            grid.innerHTML = indices.map(idx => {
                const isBull = idx.change >= 0;
                return `
                    <div class="stat-card">
                        <div class="stat-label">${idx.name} <span style="color:var(--text-muted);font-size:11px;">${codeMap[idx.name]}</span></div>
                        <div class="stat-value">${idx.point.toFixed(2)}</div>
                        <div class="stat-change ${isBull ? 'bull' : 'bear'}">
                            ${isBull ? '↑' : '↓'} ${Math.abs(idx.change).toFixed(2)} (${isBull ? '+' : ''}${idx.change_pct.toFixed(2)}%)
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderSectorChart(sectors) {
            if (sectorChart) sectorChart.dispose();
            
            sectorChart = echarts.init(document.getElementById('sectorChart'), 'dark', { backgroundColor: 'transparent' });
            
            const option = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '4%', bottom: '3%', top: '3%', containLabel: true },
                xAxis: { 
                    type: 'value', 
                    axisLabel: { formatter: '{value}万', color: '#64748b' },
                    axisLine: { lineStyle: { color: '#334155' } },
                    splitLine: { lineStyle: { color: '#1e293b' } }
                },
                yAxis: { 
                    type: 'category', 
                    data: sectors.map(d => d.sector_name),
                    axisLabel: { color: '#94a3b8' }
                },
                series: [{
                    type: 'bar',
                    data: sectors.map(s => s.net_amount / 10000),
                    barWidth: '60%',
                    itemStyle: {
                        borderRadius: [0, 6, 6, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#3b82f6' },
                            { offset: 1, color: '#8b5cf6' }
                        ])
                    }
                }]
            };
            sectorChart.setOption(option);
            window.addEventListener('resize', () => sectorChart.resize());
        }

        function renderTop5(stocks) {
            const tbody = document.getElementById('top5Table');
            tbody.innerHTML = stocks.slice(0, 5).map((s, i) => `
                <tr>
                    <td style="color:var(--text-muted);font-weight:600;">${i + 1}</td>
                    <td><span class="stock-name-cn">${s.name}</span></td>
                    <td><span class="change-badge ${s.score >= 80 ? 'bull' : 'bear'}">${s.score}</span></td>
                    <td style="color:${s.net_amount >= 0 ? 'var(--bear)' : 'var(--bull)'}">${s.net_amount >= 0 ? '↑' : '↓'} ${(Math.abs(s.net_amount)/10000).toFixed(1)}万</td>
                </tr>
            `).join('');
        }

        function renderStockTable(stocks) {
            const tbody = document.getElementById('recommendTable');
            tbody.innerHTML = stocks.map((s, i) => {
                const scoreClass = s.score >= 80 ? 'high' : s.score >= 60 ? 'medium' : 'low';
                const tagClass = s.recommendation_type.toLowerCase().replace('_', '-');
                return `
                    <tr>
                        <td style="color:var(--text-muted);font-weight:600;">${i + 1}</td>
                        <td>
                            <div class="stock-name-cell">
                                <span class="stock-name-cn">${s.name}</span>
                                <span class="stock-code">${s.ts_code}</span>
                            </div>
                        </td>
                        <td style="font-family:'JetBrains Mono';">¥${s.price.toFixed(2)}</td>
                        <td><span class="change-badge ${s.change_pct >= 0 ? 'bull' : 'bear'}">${s.change_pct >= 0 ? '↑' : '↓'} ${Math.abs(s.change_pct).toFixed(2)}%</span></td>
                        <td>
                            <div style="display:flex;align-items:center;gap:8px;">
                                <span style="font-weight:600;color:${s.score >= 80 ? 'var(--bear)' : s.score >= 60 ? '#f59e0b' : 'var(--bull)'}">${s.score}</span>
                                <div style="flex:1;height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;">
                                    <div style="height:100%;width:${s.score}%;background:${s.score >= 80 ? '#22c55e' : s.score >= 60 ? '#f59e0b' : '#ef4444'};border-radius:3px;"></div>
                                </div>
                            </div>
                        </td>
                        <td style="color:${s.net_amount >= 0 ? 'var(--bear)' : 'var(--bull)'}">${s.net_amount >= 0 ? '↑' : '↓'} ${(Math.abs(s.net_amount)/10000).toFixed(1)}万</td>
                        <td style="color:var(--text-secondary);">${s.continuous_days}天</td>
                        <td><span style="padding:3px 8px;background:rgba(255,255,255,0.05);border-radius:4px;font-size:11px;">${s.industry}</span></td>
                        <td><span class="tag tag-${tagClass}">${s.recommendation_type.replace('_', ' ')}</span></td>
                    </tr>
                `;
            }).join('');
        }

        // ============== 互动功能 ==============
        function searchStock() {
            const query = document.querySelector('.search-input').value.trim().toLowerCase();
            if (!query) { filteredStocks = [...allStocks]; }
            else { filteredStocks = allStocks.filter(s => s.name.toLowerCase().includes(query) || s.ts_code.toLowerCase().includes(query)); }
            renderStockTable(filteredStocks);
            showToast(`找到 ${filteredStocks.length} 只股票`);
        }

        function filterByIndustry() {
            const industry = document.getElementById('industryFilter').value;
            filteredStocks = industry ? allStocks.filter(s => s.industry === industry) : [...allStocks];
            renderStockTable(filteredStocks);
        }

        function exportChart() {
            if (sectorChart) {
                const url = sectorChart.getDataURL({ type: 'png', pixelRatio: 2, backgroundColor: '#1e293b' });
                const a = document.createElement('a');
                a.href = url; a.download = '板块资金流向.png'; a.click();
                showToast('图表已导出');
            }
        }

        function exportStocks() {
            const headers = ['排名','代码','名称','价格','涨跌幅','评分','净流入','连续流入','行业','建议'];
            const rows = filteredStocks.map((s,i) => [i+1,s.ts_code,s.name,s.price.toFixed(2),s.change_pct.toFixed(2)+'%',s.score,s.net_amount.toFixed(2),s.continuous_days,s.industry,s.recommendation_type]);
            const csv = '\ufeff' + [headers,...rows].map(r => r.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `资金推荐_${new Date().toLocaleDateString()}.csv`;
            a.click();
            showToast('列表已导出');
        }

        function showToast(message, type = 'success') {
            const icons = { success: '✓', error: '✕', info: 'ℹ' };
            document.getElementById('toastIcon').textContent = icons[type];
            document.getElementById('toastMessage').textContent = message;
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
