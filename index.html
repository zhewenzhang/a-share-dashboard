<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A 股资金追踪系统 | Capital Flow Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #09090b;
            --sidebar-hover: #18181b;
            --sidebar-active: rgba(99, 102, 241, 0.15);
            --sidebar-border: rgba(255, 255, 255, 0.06);
            --sidebar-text: #a1a1aa;
            --sidebar-text-active: #ffffff;
            
            --main-bg: #0c0c0e;
            --card-bg: #131316;
            --card-border: rgba(255, 255, 255, 0.04);
            --card-hover: rgba(255, 255, 255, 0.02);
            
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            
            --bull: #f43f5e;
            --bear: #10b981;
            
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --glow: 0 0 40px rgba(99, 102, 241, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--main-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(ellipse, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -50%;
            left: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(ellipse, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px 24px;
            border-bottom: 1px solid var(--sidebar-border);
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--glow);
        }

        .logo-text {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .logo-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .nav-section {
            margin-bottom: 28px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 0 12px;
            margin-bottom: 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            color: var(--sidebar-text);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 4px;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-item:hover {
            background: var(--sidebar-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--sidebar-active);
            color: var(--text-primary);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .nav-badge {
            margin-left: auto;
            padding: 2px 8px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--sidebar-border);
        }

        .version-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            font-size: 12px;
            color: var(--accent-primary);
        }

        /* ========== 主内容区 ========== */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 32px 40px;
            min-height: 100vh;
        }

        /* 顶部栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--card-border);
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            font-size: 18px;
        }

        .btn-icon:hover {
            background: var(--card-hover);
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        .btn-primary {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--bear);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        /* 卡片样式 */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow-md);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .btn-ghost {
            padding: 8px 14px;
            background: transparent;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .btn-ghost:hover {
            background: var(--card-hover);
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        /* 指数网格 */
        .indices-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .index-card {
            position: relative;
            padding: 24px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .index-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .index-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow-md);
        }

        .index-card:hover::before {
            opacity: 1;
        }

        .index-card.bull::before {
            background: linear-gradient(90deg, #f43f5e, #fb7185);
        }

        .index-card.bear::before {
            background: linear-gradient(90deg, #10b981, #34d399);
        }

        .index-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .index-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        .index-change {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .change-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .change-badge.bull {
            background: rgba(244, 63, 94, 0.15);
            color: var(--bull);
        }

        .change-badge.bear {
            background: rgba(16, 185, 129, 0.15);
            color: var(--bear);
        }

        /* 内容网格 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .chart-container {
            height: 350px;
        }

        /* 表格样式 */
        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--card-border);
        }

        .data-table td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 14px;
        }

        .data-table tbody tr {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .data-table tbody tr:hover {
            background: var(--card-hover);
        }

        .stock-name-cell {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stock-name-cn {
            font-weight: 600;
            color: var(--text-primary);
        }

        .stock-code {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .tag-strong-buy {
            background: rgba(16, 185, 129, 0.15);
            color: var(--bear);
        }

        .tag-buy {
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent-primary);
        }

        .tag-watch {
            background: rgba(113, 113, 122, 0.15);
            color: var(--text-muted);
        }

        /* 评分条 */
        .score-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-value {
            font-weight: 600;
            min-width: 32px;
        }

        .score-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .score-fill.high { background: linear-gradient(90deg, #10b981, #34d399); }
        .score-fill.medium { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .score-fill.low { background: linear-gradient(90deg, #f43f5e, #fb7185); }

        /* ========== 弹窗 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: #18181b;
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            transform: translateY(20px);
            transition: all 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: var(--card-hover);
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-secondary {
            flex: 1;
            padding: 12px 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background: var(--card-hover);
            border-color: var(--accent-primary);
        }

        /* 搜索栏 */
        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .filter-select {
            padding: 12px 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        /* 响应式 */
        @media (max-width: 1400px) {
            .indices-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
                z-index: 100;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .mobile-menu-btn {
                display: flex;
            }
        }

        .mobile-menu-btn {
            display: none;
            width: 40px;
            height: 40px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 20px;
            align-items: center;
            justify-content: center;
        }

        /* Toast 通知 */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            background: #18181b;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1100;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-icon {
            font-size: 18px;
        }

        .toast-message {
            font-size: 14px;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">📊</div>
                <div>
                    <div class="logo-text">资金追踪</div>
                    <div class="logo-subtitle">Capital Flow</div>
                </div>
            </div>

            <nav class="nav-section">
                <div class="nav-section-title">主菜单</div>
                <button class="nav-item active" onclick="switchPage('dashboard')">
                    <span class="nav-icon">🏠</span>
                    <span>数据看板</span>
                </button>
                <button class="nav-item" onclick="switchPage('analysis')">
                    <span class="nav-icon">📈</span>
                    <span>资金分析</span>
                    <span class="nav-badge">NEW</span>
                </button>
                <button class="nav-item" onclick="window.location.href='portfolio.html'">
                    <span class="nav-icon">💼</span>
                    <span>投资组合</span>
                </button>
            </nav>

            <nav class="nav-section">
                <div class="nav-section-title">工具</div>
                <button class="nav-item" onclick="switchPage('backtest')">
                    <span class="nav-icon">🧪</span>
                    <span>策略回测</span>
                </button>
                <button class="nav-item" onclick="switchPage('simulate')">
                    <span class="nav-icon">🎯</span>
                    <span>模拟交易</span>
                </button>
            </nav>

            <nav class="nav-section">
                <div class="nav-section-title">系统</div>
                <button class="nav-item" onclick="openSettings()">
                    <span class="nav-icon">⚙️</span>
                    <span>设置</span>
                </button>
                <button class="nav-item" onclick="checkApiStatus()">
                    <span class="nav-icon">🔌</span>
                    <span>API 状态</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="version-tag">
                    <span>🚀</span>
                    <span>v2.0.0</span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <div class="top-bar">
                <div>
                    <button class="mobile-menu-btn" onclick="toggleSidebar()" style="margin-bottom: 12px;">
                        ☰
                    </button>
                    <h1 class="page-title">数据看板</h1>
                    <p class="page-subtitle">实时监控 A 股市场资金流向</p>
                </div>
                <div class="top-actions">
                    <div class="status-indicator">
                        <span class="status-dot" id="apiStatusDot"></span>
                        <span id="apiStatusText">模拟数据</span>
                    </div>
                    <button class="btn-icon" onclick="openSettings()" title="设置">⚙️</button>
                    <button class="btn-primary" onclick="refreshData()">
                        <span>🔄</span>
                        <span>刷新</span>
                    </button>
                </div>
            </div>

            <!-- 搜索和筛选 -->
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="搜索股票代码或名称..." onkeypress="if(event.keyCode===13) searchStock()">
                </div>
                <select class="filter-select" id="industryFilter" onchange="filterByIndustry()">
                    <option value="">全部行业</option>
                    <option value="电池">电池</option>
                    <option value="半导体">半导体</option>
                    <option value="白酒">白酒</option>
                    <option value="汽车">汽车</option>
                    <option value="券商">券商</option>
                    <option value="光伏">光伏</option>
                    <option value="银行">银行</option>
                </select>
            </div>

            <!-- 指数卡片 -->
            <div class="indices-grid" id="indicesGrid">
                <div class="card" style="display:flex;align-items:center;justify-content:center;min-height:150px;">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- 内容网格 -->
            <div class="content-grid">
                <!-- 板块资金流向 -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <span>🔥</span>
                            板块资金流向
                        </div>
                        <div class="card-actions">
                            <button class="btn-ghost" onclick="exportChart()">📥 导出</button>
                        </div>
                    </div>
                    <div id="sectorChart" class="chart-container"></div>
                </div>

                <!-- 资金强度 TOP5 -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <span>⭐</span>
                            资金强度 TOP5
                        </div>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>股票</th>
                                <th>评分</th>
                                <th>净流入</th>
                            </tr>
                        </thead>
                        <tbody id="top5Table">
                            <tr><td colspan="4" style="text-align:center;padding:40px;">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 全部推荐 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>📊</span>
                        资金强度推荐
                    </div>
                    <div class="card-actions">
                        <button class="btn-ghost" onclick="exportStocks()">📊 导出 CSV</button>
                    </div>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>股票名称</th>
                                <th>最新价</th>
                                <th>涨跌幅</th>
                                <th>资金强度</th>
                                <th>主力净流入</th>
                                <th>连续流入</th>
                                <th>行业</th>
                                <th>建议</th>
                            </tr>
                        </thead>
                        <tbody id="recommendTable">
                            <tr><td colspan="9" style="text-align:center;padding:40px;">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal" onclick="closeSettings(event)">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">⚙️ 系统设置</h2>
                <button class="modal-close" onclick="closeSettings()">✕</button>
            </div>
            
            <div class="form-group">
                <label class="form-label">TuShare API Token</label>
                <input type="text" class="form-input" id="tushareToken" placeholder="请输入你的 TuShare Token">
                <p class="form-hint">📌 访问 <a href="https://tushare.pro" target="_blank" style="color:var(--accent-primary);">tushare.pro</a> 注册并获取 Token</p>
            </div>

            <div class="form-group">
                <label class="form-label">数据源</label>
                <select class="form-input" id="dataSource">
                    <option value="mock">模拟数据（演示模式）</option>
                    <option value="tushare">TuShare API（需配置 Token）</option>
                </select>
            </div>

            <div class="form-actions">
                <button class="btn-secondary" onclick="closeSettings()">取消</button>
                <button class="btn-primary" onclick="saveSettings()" style="flex:1;">💾 保存设置</button>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="detailModal" onclick="closeDetail(event)">
        <div class="modal" style="max-width:700px;">
            <div class="modal-header">
                <h2 class="modal-title" id="detailTitle">股票详情</h2>
                <button class="modal-close" onclick="closeDetail()">✕</button>
            </div>
            <div id="detailContent"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon">✅</span>
        <span class="toast-message" id="toastMessage">操作成功</span>
    </div>

    <script>
        // ============== 全局状态 ==============
        let allStocks = [];
        let filteredStocks = [];
        let sectorChart = null;
        let config = {
            tushareToken: localStorage.getItem('tushareToken') || '',
            dataSource: localStorage.getItem('dataSource') || 'mock'
        };

        // ============== 初始化 ==============
        document.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            refreshData();
        });

        // ============== 配置管理 ==============
        function loadConfig() {
            document.getElementById('tushareToken').value = config.tushareToken;
            document.getElementById('dataSource').value = config.dataSource;
            updateApiStatus();
        }

        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings(event) {
            if (!event || event.target === document.getElementById('settingsModal')) {
                document.getElementById('settingsModal').classList.remove('active');
            }
        }

        function saveSettings() {
            config.tushareToken = document.getElementById('tushareToken').value.trim();
            config.dataSource = document.getElementById('dataSource').value;
            
            localStorage.setItem('tushareToken', config.tushareToken);
            localStorage.setItem('dataSource', config.dataSource);
            
            closeSettings();
            updateApiStatus();
            showToast('✅ 设置已保存', 'success');
            
            // 重新加载数据
            refreshData();
        }

        function updateApiStatus() {
            const dot = document.getElementById('apiStatusDot');
            const text = document.getElementById('apiStatusText');
            
            if (config.dataSource === 'tushare' && config.tushareToken) {
                dot.style.background = 'var(--bear)';
                text.textContent = 'TuShare API';
            } else {
                dot.style.background = 'var(--text-muted)';
                text.textContent = '模拟数据';
            }
        }

        function checkApiStatus() {
            if (config.dataSource === 'tushare' && config.tushareToken) {
                showToast('✅ TuShare API 已配置', 'success');
            } else {
                showToast('ℹ️ 当前使用模拟数据，请在设置中配置 TuShare Token', 'info');
            }
        }

        // ============== 页面导航 ==============
        function switchPage(page) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            showToast('🚧 页面开发中...', 'info');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // ============== 数据获取 ==============
        async function refreshData() {
            try {
                const [indices, sectors, recommendations] = await Promise.all([
                    fetchIndices(),
                    fetchSectorFlow(),
                    fetchRecommendations()
                ]);
                
                renderIndices(indices);
                renderSectorChart(sectors);
                renderTop5(recommendations);
                renderStockTable(recommendations);
                
                allStocks = recommendations;
                filteredStocks = [...allStocks];
                
                showToast('✅ 数据已更新', 'success');
            } catch (error) {
                showToast('❌ 数据刷新失败', 'error');
            }
        }

        async function fetchIndices() {
            if (config.dataSource === 'tushare' && config.tushareToken) {
                // TODO: 真实 API 调用
            }
            return getMockIndices();
        }

        async function fetchSectorFlow() {
            if (config.dataSource === 'tushare' && config.tushareToken) {
                // TODO: 真实 API 调用
            }
            return getMockSectorFlow();
        }

        async function fetchRecommendations() {
            if (config.dataSource === 'tushare' && config.tushareToken) {
                // TODO: 真实 API 调用
            }
            return getMockRecommendations();
        }

        // ============== 渲染函数 ==============
        function renderIndices(indices) {
            const grid = document.getElementById('indicesGrid');
            const iconMap = { '上证指数': '📊', '深证成指': '📈', '创业板指': '🚀', '沪深 300': '💎' };
            const codeMap = { '上证指数': 'SH000001', '深证成指': 'SZ399001', '创业板指': 'SZ399006', '沪深 300': 'SH000300' };

            grid.innerHTML = indices.map(idx => {
                const isBull = idx.change >= 0;
                return `
                    <div class="index-card ${isBull ? 'bull' : 'bear'}" onclick="showDetail('${idx.name}')">
                        <div class="index-name">${iconMap[idx.name] || '📊'} ${idx.name} <span style="color:var(--text-muted);font-size:11px;">${codeMap[idx.name]}</span></div>
                        <div class="index-value">${idx.point.toFixed(2)}</div>
                        <div class="index-change">
                            <span class="change-badge ${isBull ? 'bull' : 'bear'}">
                                ${isBull ? '↑' : '↓'} ${Math.abs(idx.change).toFixed(2)} (${isBull ? '+' : ''}${idx.change_pct.toFixed(2)}%)
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderSectorChart(sectors) {
            if (sectorChart) sectorChart.dispose();
            
            sectorChart = echarts.init(document.getElementById('sectorChart'), 'dark', {
                backgroundColor: 'transparent'
            });
            
            const option = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '4%', bottom: '3%', top: '3%', containLabel: true },
                xAxis: { 
                    type: 'value', 
                    axisLabel: { formatter: '{value}万' },
                    axisLine: { lineStyle: { color: '#3f3f46' } },
                    splitLine: { lineStyle: { color: '#27272a' } }
                },
                yAxis: { 
                    type: 'category', 
                    data: sectors.map(d => d.sector_name),
                    axisLabel: { color: '#a1a1aa' }
                },
                series: [{
                    type: 'bar',
                    data: sectors.map(s => s.net_amount / 10000),
                    barWidth: '60%',
                    itemStyle: {
                        borderRadius: [0, 8, 8, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#6366f1' },
                            { offset: 1, color: '#8b5cf6' }
                        ])
                    }
                }]
            };
            sectorChart.setOption(option);
            window.addEventListener('resize', () => sectorChart.resize());
        }

        function renderTop5(stocks) {
            const tbody = document.getElementById('top5Table');
            tbody.innerHTML = stocks.slice(0, 5).map((s, i) => `
                <tr onclick="showDetail('${s.name}')" style="cursor:pointer;">
                    <td style="color:var(--text-muted);font-weight:600;">${i + 1}</td>
                    <td><span class="stock-name-cn">${s.name}</span></td>
                    <td><span class="change-badge ${s.score >= 80 ? 'bull' : 'bear'}">${s.score}</span></td>
                    <td style="color:${s.net_amount >= 0 ? 'var(--bear)' : 'var(--bull)'}">${s.net_amount >= 0 ? '↑' : '↓'} ${(Math.abs(s.net_amount)/10000).toFixed(1)}万</td>
                </tr>
            `).join('');
        }

        function renderStockTable(stocks) {
            const tbody = document.getElementById('recommendTable');
            tbody.innerHTML = stocks.map((s, i) => {
                const scoreClass = s.score >= 80 ? 'high' : s.score >= 60 ? 'medium' : 'low';
                const tagClass = s.recommendation_type.toLowerCase().replace('_', '-');
                return `
                    <tr onclick="showDetail('${s.name}')">
                        <td style="color:var(--text-muted);font-weight:600;">${i + 1}</td>
                        <td>
                            <div class="stock-name-cell">
                                <span class="stock-name-cn">${s.name}</span>
                                <span class="stock-code">${s.ts_code}</span>
                            </div>
                        </td>
                        <td style="font-family:'JetBrains Mono';">¥${s.price.toFixed(2)}</td>
                        <td><span class="change-badge ${s.change_pct >= 0 ? 'bull' : 'bear'}">${s.change_pct >= 0 ? '↑' : '↓'} ${Math.abs(s.change_pct).toFixed(2)}%</span></td>
                        <td>
                            <div class="score-cell">
                                <span class="score-value" style="color:${s.score >= 80 ? 'var(--bear)' : s.score >= 60 ? '#f59e0b' : 'var(--bull)'}">${s.score}</span>
                                <div class="score-bar"><div class="score-fill ${scoreClass}" style="width:${s.score}%"></div></div>
                            </div>
                        </td>
                        <td style="color:${s.net_amount >= 0 ? 'var(--bear)' : 'var(--bull)'}">${s.net_amount >= 0 ? '↑' : '↓'} ${(Math.abs(s.net_amount)/10000).toFixed(1)}万</td>
                        <td style="color:var(--text-secondary);">${s.continuous_days}天</td>
                        <td><span style="padding:4px 10px;background:rgba(255,255,255,0.05);border-radius:6px;font-size:12px;">${s.industry}</span></td>
                        <td><span class="tag tag-${tagClass}">${s.recommendation_type.replace('_', ' ')}</span></td>
                    </tr>
                `;
            }).join('');
        }

        // ============== 互动功能 ==============
        function searchStock() {
            const query = document.querySelector('.search-input').value.trim().toLowerCase();
            if (!query) {
                filteredStocks = [...allStocks];
            } else {
                filteredStocks = allStocks.filter(s => s.name.toLowerCase().includes(query) || s.ts_code.toLowerCase().includes(query));
            }
            renderStockTable(filteredStocks);
            showToast(`找到 ${filteredStocks.length} 只股票`, 'success');
        }

        function filterByIndustry() {
            const industry = document.getElementById('industryFilter').value;
            filteredStocks = industry ? allStocks.filter(s => s.industry === industry) : [...allStocks];
            renderStockTable(filteredStocks);
        }

        function showDetail(name) {
            const stock = allStocks.find(s => s.name === name);
            if (!stock) return;
            
            document.getElementById('detailTitle').textContent = `${stock.name} (${stock.ts_code})`;
            document.getElementById('detailContent').innerHTML = `
                <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">
                    <div class="card" style="padding:16px;"><div style="color:var(--text-muted);font-size:12px;">最新价</div><div style="font-size:24px;font-weight:700;">¥${stock.price.toFixed(2)}</div></div>
                    <div class="card" style="padding:16px;"><div style="color:var(--text-muted);font-size:12px;">涨跌幅</div><div style="font-size:24px;font-weight:700;color:${stock.change_pct >= 0 ? 'var(--bear)' : 'var(--bull)'}">${stock.change_pct >= 0 ? '↑' : '↓'} ${Math.abs(stock.change_pct).toFixed(2)}%</div></div>
                    <div class="card" style="padding:16px;"><div style="color:var(--text-muted);font-size:12px;">资金强度</div><div style="font-size:24px;font-weight:700;color:${stock.score >= 80 ? 'var(--bear)' : 'var(--bull)'}">${stock.score}</div></div>
                    <div class="card" style="padding:16px;"><div style="color:var(--text-muted);font-size:12px;">主力净流入</div><div style="font-size:24px;font-weight:700;color:${stock.net_amount >= 0 ? 'var(--bear)' : 'var(--bull)'}">${stock.net_amount >= 0 ? '↑' : '↓'} ${(Math.abs(stock.net_amount)/10000).toFixed(1)}万</div></div>
                </div>
                <div class="card" style="margin-top:16px;padding:16px;">
                    <div style="color:var(--text-muted);font-size:12px;margin-bottom:8px;">所属行业</div>
                    <div style="font-size:16px;">${stock.industry}</div>
                </div>
                <div class="card" style="margin-top:16px;padding:16px;">
                    <div style="color:var(--text-muted);font-size:12px;margin-bottom:8px;">投资建议</div>
                    <span class="tag tag-${stock.recommendation_type.toLowerCase().replace('_', '-')}">${stock.recommendation_type.replace('_', ' ')}</span>
                </div>
            `;
            document.getElementById('detailModal').classList.add('active');
        }

        function closeDetail(event) {
            if (!event || event.target === document.getElementById('detailModal')) {
                document.getElementById('detailModal').classList.remove('active');
            }
        }

        function exportChart() {
            if (sectorChart) {
                const url = sectorChart.getDataURL({ type: 'png', pixelRatio: 2, backgroundColor: '#18181b' });
                const a = document.createElement('a');
                a.href = url;
                a.download = '板块资金流向.png';
                a.click();
                showToast('📥 图表已导出', 'success');
            }
        }

        function exportStocks() {
            const headers = ['排名','代码','名称','价格','涨跌幅','评分','净流入','连续流入','行业','建议'];
            const rows = filteredStocks.map((s,i) => [i+1,s.ts_code,s.name,s.price.toFixed(2),s.change_pct.toFixed(2)+'%',s.score,s.net_amount.toFixed(2),s.continuous_days,s.industry,s.recommendation_type]);
            const csv = '\ufeff' + [headers,...rows].map(r => r.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `资金推荐_${new Date().toLocaleDateString()}.csv`;
            a.click();
            showToast('📊 列表已导出', 'success');
        }

        function showToast(message, type = 'success') {
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            document.getElementById('toastIcon').textContent = icons[type];
            document.getElementById('toastMessage').textContent = message;
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
        }

        // ============== 模拟数据 ==============
        function getMockIndices() {
            return [
                { name: '上证指数', point: 3420.25, change: 12.34, change_pct: 0.36 },
                { name: '深证成指', point: 11565.82, change: -45.67, change_pct: -0.39 },
                { name: '创业板指', point: 2356.31, change: 28.45, change_pct: 1.22 },
                { name: '沪深 300', point: 4321.56, change: 15.34, change_pct: 0.36 }
            ];
        }

        function getMockSectorFlow() {
            return [
                { sector_name: '半导体', net_amount: 156000 },
                { sector_name: '人工智能', net_amount: 123000 },
                { sector_name: '光伏设备', net_amount: 98000 },
                { sector_name: '汽车整车', net_amount: 85000 },
                { sector_name: '医疗器械', net_amount: 62000 },
                { sector_name: '软件开发', net_amount: 51000 },
                { sector_name: '电池', net_amount: 43000 },
                { sector_name: '通信设备', net_amount: 32000 },
                { sector_name: '券商', net_amount: 21000 },
                { sector_name: '家电', net_amount: 12000 }
            ];
        }

        function getMockRecommendations() {
            return [
                { ts_code: '300750.SZ', name: '宁德时代', price: 412.56, change_pct: 2.34, score: 92.5, net_amount: 85000, continuous_days: 5, industry: '电池', recommendation_type: 'STRONG_BUY' },
                { ts_code: '688981.SH', name: '中芯国际', price: 52.38, change_pct: 4.56, score: 88.3, net_amount: 123000, continuous_days: 4, industry: '半导体', recommendation_type: 'STRONG_BUY' },
                { ts_code: '000858.SZ', name: '五粮液', price: 168.92, change_pct: 0.87, score: 75.2, net_amount: 21000, continuous_days: 3, industry: '白酒', recommendation_type: 'BUY' },
                { ts_code: '002594.SZ', name: '比亚迪', price: 268.45, change_pct: -1.23, score: 72.8, net_amount: -32000, continuous_days: 2, industry: '汽车', recommendation_type: 'BUY' },
                { ts_code: '600030.SH', name: '中信证券', price: 28.92, change_pct: 1.23, score: 68.5, net_amount: 56000, continuous_days: 3, industry: '券商', recommendation_type: 'BUY' },
                { ts_code: '601012.SH', name: '隆基绿能', price: 32.45, change_pct: 1.89, score: 65.3, net_amount: 35000, continuous_days: 2, industry: '光伏', recommendation_type: 'BUY' },
                { ts_code: '000001.SZ', name: '平安银行', price: 14.25, change_pct: -0.56, score: 58.7, net_amount: -18000, continuous_days: 1, industry: '银行', recommendation_type: 'WATCH' },
                { ts_code: '600036.SH', name: '招商银行', price: 38.45, change_pct: -0.32, score: 55.2, net_amount: -12000, continuous_days: 1, industry: '银行', recommendation_type: 'WATCH' }
            ];
        }
    </script>
</body>
</html>
