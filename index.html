<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A 股市场看板 | A-Share Market Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(30, 41, 59, 0.6);
            --bg-card-hover: rgba(51, 65, 85, 0.8);
            --border-color: rgba(148, 163, 184, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --bull-red: #ef4444;
            --bear-green: #22c55e;
            --gradient-bull: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            --gradient-bear: linear-gradient(135deg, #22c55e 0%, #10b981 100%);
            --gradient-accent: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.15);
            --glow-red: 0 0 30px rgba(239, 68, 68, 0.3);
            --glow-green: 0 0 30px rgba(34, 197, 94, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        /* 动态背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* 网格背景 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(148, 163, 184, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 24px 32px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: var(--gradient-accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-glow);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f8fafc 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .update-time {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .update-time .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .btn-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--gradient-accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        .btn-refresh:active {
            transform: translateY(0);
        }

        .btn-refresh .icon {
            font-size: 16px;
            transition: transform 0.5s ease;
        }

        .btn-refresh:hover .icon {
            transform: rotate(180deg);
        }

        /* 指数卡片网格 */
        .indices-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .index-card {
            position: relative;
            padding: 28px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .index-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-accent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .index-card:hover {
            transform: translateY(-4px);
            background: var(--bg-card-hover);
            box-shadow: var(--shadow-glow);
        }

        .index-card:hover::before {
            opacity: 1;
        }

        .index-card.bull::before {
            background: var(--gradient-bull);
        }

        .index-card.bear::before {
            background: var(--gradient-bear);
        }

        .index-card.bull .index-glow {
            background: var(--glow-red);
        }

        .index-card.bear .index-glow {
            background: var(--glow-green);
        }

        .index-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .index-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .index-icon {
            font-size: 18px;
        }

        .index-badge {
            padding: 4px 10px;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .index-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .index-change {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 600;
        }

        .change-value {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
        }

        .change-value.bull {
            color: var(--bull-red);
            background: rgba(239, 68, 68, 0.1);
        }

        .change-value.bear {
            color: var(--bear-green);
            background: rgba(34, 197, 94, 0.1);
        }

        .change-arrow {
            font-size: 14px;
        }

        .change-percent {
            padding: 6px 12px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .change-percent.bull {
            color: var(--bull-red);
            background: rgba(239, 68, 68, 0.1);
        }

        .change-percent.bear {
            color: var(--bear-green);
            background: rgba(34, 197, 94, 0.1);
        }

        /* 涨跌统计 */
        .market-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            position: relative;
            padding: 32px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            text-align: center;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .stat-card.bull::after {
            background: var(--gradient-bull);
        }

        .stat-card.neutral::after {
            background: linear-gradient(135deg, #64748b 0%, #94a3b8 100%);
        }

        .stat-card.bear::after {
            background: var(--gradient-bear);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -2px;
        }

        .stat-value.bull {
            color: var(--bull-red);
            text-shadow: var(--glow-red);
        }

        .stat-value.neutral {
            color: var(--text-secondary);
        }

        .stat-value.bear {
            color: var(--bear-green);
            text-shadow: var(--glow-green);
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 图表区域 */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            padding: 28px;
            transition: all 0.3s ease;
        }

        .chart-card:hover {
            background: var(--bg-card-hover);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .chart-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chart-icon {
            font-size: 22px;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chart-actions {
            display: flex;
            gap: 8px;
        }

        .chart-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-secondary);
        }

        .chart-btn:hover {
            background: rgba(148, 163, 184, 0.2);
            color: var(--text-primary);
        }

        .chart-container {
            height: 350px;
        }

        /* 股票表格 */
        .stocks-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stocks-card:hover {
            background: var(--bg-card-hover);
        }

        .stocks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 28px;
            border-bottom: 1px solid var(--border-color);
        }

        .stocks-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stocks-icon {
            font-size: 22px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stock-table {
            width: 100%;
            border-collapse: collapse;
        }

        .stock-table th {
            padding: 16px 28px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(148, 163, 184, 0.05);
            border-bottom: 1px solid var(--border-color);
        }

        .stock-table td {
            padding: 20px 28px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.05);
            transition: all 0.2s ease;
        }

        .stock-table tr {
            transition: all 0.2s ease;
        }

        .stock-table tbody tr:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        .stock-name {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stock-name-cn {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
        }

        .stock-code {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .stock-price {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stock-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .stock-change.bull {
            color: var(--bull-red);
            background: rgba(239, 68, 68, 0.1);
        }

        .stock-change.bear {
            color: var(--bear-green);
            background: rgba(34, 197, 94, 0.1);
        }

        .stock-volume,
        .stock-inflow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .stock-inflow.bull {
            color: var(--bull-red);
        }

        .stock-inflow.bear {
            color: var(--bear-green);
        }

        .stock-industry {
            padding: 6px 12px;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            display: inline-block;
        }

        /* 响应式设计 */
        @media (max-width: 1400px) {
            .indices-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 1024px) {
            .container {
                padding: 16px;
            }
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            .header-left {
                flex-direction: column;
                gap: 12px;
            }
            .indices-grid {
                grid-template-columns: 1fr;
            }
            .market-stats {
                grid-template-columns: 1fr;
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
            .stock-table {
                font-size: 13px;
            }
            .stock-table th,
            .stock-table td {
                padding: 12px 16px;
            }
        }

        @media (max-width: 640px) {
            .header h1 {
                font-size: 22px;
            }
            .index-value {
                font-size: 28px;
            }
            .stat-value {
                font-size: 36px;
            }
        }

        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 数据闪烁效果 */
        .flash-up {
            animation: flashGreen 0.6s ease;
        }

        .flash-down {
            animation: flashRed 0.6s ease;
        }

        @keyframes flashGreen {
            0% { background: rgba(34, 197, 94, 0.3); }
            100% { background: transparent; }
        }

        @keyframes flashRed {
            0% { background: rgba(239, 68, 68, 0.3); }
            100% { background: transparent; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">📈</div>
                <div>
                    <h1>A 股市场看板</h1>
                    <div class="header-subtitle">A-Share Market Dashboard</div>
                </div>
            </div>
            <div class="header-right">
                <div class="update-time">
                    <span class="dot"></span>
                    <span>更新于 <span id="updateTime">--:--:--</span></span>
                </div>
                <button class="btn-refresh" onclick="refreshData()">
                    <span class="icon">🔄</span>
                    <span>刷新数据</span>
                </button>
            </div>
        </header>

        <!-- 三大指数 -->
        <div class="indices-grid">
            <div class="index-card" id="shCard">
                <div class="index-header">
                    <div class="index-name">
                        <span class="index-icon">📊</span>
                        上证指数
                    </div>
                    <span class="index-badge">SH000001</span>
                </div>
                <div class="index-value" id="shValue">--</div>
                <div class="index-change">
                    <span class="change-value" id="shChangeValue">
                        <span class="change-arrow">--</span>
                        <span>--</span>
                    </span>
                    <span class="change-percent" id="shChangePercent">--%</span>
                </div>
            </div>

            <div class="index-card" id="szCard">
                <div class="index-header">
                    <div class="index-name">
                        <span class="index-icon">📈</span>
                        深证成指
                    </div>
                    <span class="index-badge">SZ399001</span>
                </div>
                <div class="index-value" id="szValue">--</div>
                <div class="index-change">
                    <span class="change-value" id="szChangeValue">
                        <span class="change-arrow">--</span>
                        <span>--</span>
                    </span>
                    <span class="change-percent" id="szChangePercent">--%</span>
                </div>
            </div>

            <div class="index-card" id="cyCard">
                <div class="index-header">
                    <div class="index-name">
                        <span class="index-icon">🚀</span>
                        创业板指
                    </div>
                    <span class="index-badge">SZ399006</span>
                </div>
                <div class="index-value" id="cyValue">--</div>
                <div class="index-change">
                    <span class="change-value" id="cyChangeValue">
                        <span class="change-arrow">--</span>
                        <span>--</span>
                    </span>
                    <span class="change-percent" id="cyChangePercent">--%</span>
                </div>
            </div>

            <div class="index-card" id="hsCard">
                <div class="index-header">
                    <div class="index-name">
                        <span class="index-icon">💎</span>
                        沪深 300
                    </div>
                    <span class="index-badge">SH000300</span>
                </div>
                <div class="index-value" id="hsValue">--</div>
                <div class="index-change">
                    <span class="change-value" id="hsChangeValue">
                        <span class="change-arrow">--</span>
                        <span>--</span>
                    </span>
                    <span class="change-percent" id="hsChangePercent">--%</span>
                </div>
            </div>
        </div>

        <!-- 涨跌统计 -->
        <div class="market-stats">
            <div class="stat-card bull">
                <div class="stat-icon">📈</div>
                <div class="stat-value bull" id="upCount">--</div>
                <div class="stat-label">上涨家数</div>
            </div>
            <div class="stat-card neutral">
                <div class="stat-icon">➖</div>
                <div class="stat-value neutral" id="flatCount">--</div>
                <div class="stat-label">平盘家数</div>
            </div>
            <div class="stat-card bear">
                <div class="stat-icon">📉</div>
                <div class="stat-value bear" id="downCount">--</div>
                <div class="stat-label">下跌家数</div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">
                        <span class="chart-icon">🔥</span>
                        板块涨幅榜 TOP10
                    </div>
                    <div class="chart-actions">
                        <button class="chart-btn" title="刷新">🔄</button>
                        <button class="chart-btn" title="导出">📥</button>
                    </div>
                </div>
                <div id="sectorChart" class="chart-container"></div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">
                        <span class="chart-icon">💰</span>
                        资金流向
                    </div>
                    <div class="chart-actions">
                        <button class="chart-btn" title="刷新">🔄</button>
                        <button class="chart-btn" title="详情">📊</button>
                    </div>
                </div>
                <div id="fundFlowChart" class="chart-container"></div>
            </div>
        </div>

        <!-- 股票监控 -->
        <div class="stocks-card">
            <div class="stocks-header">
                <div class="stocks-title">
                    <span class="stocks-icon">⭐</span>
                    重要股票监控
                </div>
                <div class="chart-actions">
                    <button class="chart-btn" title="添加股票">➕</button>
                    <button class="chart-btn" title="设置">⚙️</button>
                </div>
            </div>
            <table class="stock-table">
                <thead>
                    <tr>
                        <th>股票名称</th>
                        <th>最新价</th>
                        <th>涨跌幅</th>
                        <th>成交量</th>
                        <th>主力净流入</th>
                        <th>所属行业</th>
                    </tr>
                </thead>
                <tbody id="stockTable">
                    <tr>
                        <td colspan="6" class="loading">
                            <div class="spinner"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 模拟数据生成（实际使用时替换为 TuShare API）
        function generateMockData() {
            const isBull = Math.random() > 0.5;
            return {
                indices: {
                    sh: { 
                        value: 3420.25 + (Math.random() - 0.5) * 50, 
                        change: (Math.random() - 0.5) * 80, 
                        pct: (Math.random() - 0.5) * 2 
                    },
                    sz: { 
                        value: 11565.82 + (Math.random() - 0.5) * 200, 
                        change: (Math.random() - 0.5) * 150, 
                        pct: (Math.random() - 0.5) * 1.5 
                    },
                    cy: { 
                        value: 2356.31 + (Math.random() - 0.5) * 30, 
                        change: (Math.random() - 0.5) * 40, 
                        pct: (Math.random() - 0.5) * 2 
                    },
                    hs: { 
                        value: 4321.56 + (Math.random() - 0.5) * 40, 
                        change: (Math.random() - 0.5) * 50, 
                        pct: (Math.random() - 0.5) * 1.2 
                    }
                },
                stats: {
                    up: Math.floor(Math.random() * 2000) + 1500,
                    flat: Math.floor(Math.random() * 500) + 200,
                    down: Math.floor(Math.random() * 1500) + 1000
                },
                sectors: [
                    { name: '半导体', change: 3.25 },
                    { name: '人工智能', change: 2.88 },
                    { name: '光伏设备', change: 2.45 },
                    { name: '汽车整车', change: 1.98 },
                    { name: '医疗器械', change: 1.56 },
                    { name: '软件开发', change: 1.32 },
                    { name: '电池', change: 0.98 },
                    { name: '通信设备', change: 0.76 },
                    { name: '券商', change: 0.54 },
                    { name: '家电', change: 0.32 }
                ],
                fundFlow: {
                    north: Math.floor(Math.random() * 500) + 100,
                    south: Math.floor(Math.random() * 200) + 50,
                    main: Math.floor(Math.random() * 800) - 200
                },
                stocks: [
                    { name: '宁德时代', code: '300750', price: 412.56 + (Math.random()-0.5)*10, change: 2.34, volume: '125.6 亿', mainInflow: 8.5, industry: '电池' },
                    { name: '比亚迪', code: '002594', price: 268.45 + (Math.random()-0.5)*8, change: -1.23, volume: '89.2 亿', mainInflow: -3.2, industry: '汽车' },
                    { name: '中芯国际', code: '688981', price: 52.38 + (Math.random()-0.5)*2, change: 4.56, volume: '156.8 亿', mainInflow: 12.3, industry: '半导体' },
                    { name: '五粮液', code: '000858', price: 168.92 + (Math.random()-0.5)*5, change: 0.87, volume: '45.6 亿', mainInflow: 2.1, industry: '白酒' },
                    { name: '招商银行', code: '600036', price: 38.45 + (Math.random()-0.5)*1, change: -0.56, volume: '32.1 亿', mainInflow: -1.8, industry: '银行' },
                    { name: '中信证券', code: '600030', price: 28.92 + (Math.random()-0.5)*1, change: 1.23, volume: '78.5 亿', mainInflow: 5.6, industry: '券商' },
                    { name: '紫光国微', code: '002049', price: 98.76 + (Math.random()-0.5)*3, change: 3.45, volume: '56.3 亿', mainInflow: 4.2, industry: '半导体' },
                    { name: '隆基绿能', code: '601012', price: 32.45 + (Math.random()-0.5)*1, change: 1.89, volume: '67.8 亿', mainInflow: 3.5, industry: '光伏' }
                ]
            };
        }

        // 格式化数字
        function formatNumber(num) {
            return num.toLocaleString('zh-CN');
        }

        function formatPercent(num) {
            const sign = num >= 0 ? '+' : '';
            return sign + num.toFixed(2) + '%';
        }

        function formatChange(num) {
            return num >= 0 ? '+' + num.toFixed(2) : num.toFixed(2);
        }

        // 渲染指数卡片
        function renderIndices(data) {
            const indices = ['sh', 'sz', 'cy', 'hs'];
            const ids = ['sh', 'sz', 'cy', 'hs'];
            
            indices.forEach((idx, i) => {
                const card = document.getElementById(idx + 'Card');
                const valueEl = document.getElementById(idx + 'Value');
                const changeValueEl = document.getElementById(idx + 'ChangeValue');
                const changePercentEl = document.getElementById(idx + 'ChangePercent');
                
                const datum = data.indices[idx];
                const isBull = datum.change >= 0;
                
                // 更新卡片状态
                card.className = 'index-card ' + (isBull ? 'bull' : 'bear');
                
                // 更新数值
                valueEl.textContent = datum.value.toFixed(2);
                valueEl.className = 'index-value ' + (isBull ? 'bull' : 'bear');
                
                // 更新涨跌
                const arrow = isBull ? '↑' : '↓';
                changeValueEl.className = 'change-value ' + (isBull ? 'bull' : 'bear');
                changeValueEl.innerHTML = `
                    <span class="change-arrow">${arrow}</span>
                    <span>${formatChange(Math.abs(datum.change))}</span>
                `;
                
                changePercentEl.className = 'change-percent ' + (isBull ? 'bull' : 'bear');
                changePercentEl.textContent = formatPercent(datum.pct);
            });
        }

        // 渲染涨跌统计
        function renderStats(data) {
            document.getElementById('upCount').textContent = formatNumber(data.stats.up);
            document.getElementById('flatCount').textContent = formatNumber(data.stats.flat);
            document.getElementById('downCount').textContent = formatNumber(data.stats.down);
        }

        // 初始化板块图表
        function initSectorChart(data) {
            const chart = echarts.init(document.getElementById('sectorChart'));
            const chartData = data.sectors.map(s => ({
                name: s.name,
                value: s.change
            }));

            const option = {
                tooltip: { 
                    trigger: 'axis', 
                    axisPointer: { type: 'shadow' },
                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                    borderColor: 'rgba(148, 163, 184, 0.2)',
                    textStyle: { color: '#f8fafc' }
                },
                grid: { 
                    left: '3%', 
                    right: '4%', 
                    bottom: '3%', 
                    top: '3%',
                    containLabel: true 
                },
                xAxis: { 
                    type: 'value', 
                    axisLabel: { 
                        formatter: '{value}%',
                        color: '#94a3b8'
                    },
                    axisLine: { lineStyle: { color: 'rgba(148, 163, 184, 0.2)' } },
                    splitLine: { lineStyle: { color: 'rgba(148, 163, 184, 0.1)' } }
                },
                yAxis: { 
                    type: 'category', 
                    data: chartData.map(d => d.name),
                    axisLabel: { color: '#94a3b8' },
                    axisLine: { lineStyle: { color: 'rgba(148, 163, 184, 0.2)' } }
                },
                series: [{
                    type: 'bar',
                    data: chartData,
                    barWidth: '60%',
                    itemStyle: {
                        borderRadius: [0, 8, 8, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: 'rgba(59, 130, 246, 0.8)' },
                            { offset: 1, color: 'rgba(139, 92, 246, 0.8)' }
                        ])
                    },
                    emphasis: {
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                                { offset: 0, color: 'rgba(59, 130, 246, 1)' },
                                { offset: 1, color: 'rgba(139, 92, 246, 1)' }
                            ])
                        }
                    }
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 初始化资金流向图表
        function initFundFlowChart(data) {
            const chart = echarts.init(document.getElementById('fundFlowChart'));
            
            const option = {
                tooltip: { 
                    trigger: 'item', 
                    formatter: '{b}: {c}亿',
                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                    borderColor: 'rgba(148, 163, 184, 0.2)',
                    textStyle: { color: '#f8fafc' }
                },
                legend: { 
                    bottom: '5%', 
                    left: 'center',
                    textStyle: { color: '#94a3b8' }
                },
                series: [{
                    type: 'pie',
                    radius: ['45%', '70%'],
                    center: ['50%', '45%'],
                    avoidLabelOverlap: false,
                    itemStyle: {
                        borderRadius: 10,
                        borderColor: 'rgba(15, 23, 42, 0.5)',
                        borderWidth: 2
                    },
                    label: {
                        show: true,
                        position: 'outside',
                        formatter: '{b}\n{c}亿',
                        color: '#94a3b8'
                    },
                    emphasis: {
                        label: {
                            show: true,
                            fontSize: 16,
                            fontWeight: 'bold',
                            color: '#f8fafc'
                        },
                        itemStyle: {
                            shadowBlur: 20,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    },
                    labelLine: {
                        show: true,
                        lineStyle: { color: 'rgba(148, 163, 184, 0.5)' }
                    },
                    data: [
                        { 
                            value: data.fundFlow.north, 
                            name: '北向资金',
                            itemStyle: { 
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: '#3b82f6' },
                                    { offset: 1, color: '#8b5cf6' }
                                ])
                            }
                        },
                        { 
                            value: data.fundFlow.south, 
                            name: '南向资金',
                            itemStyle: { 
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: '#06b6d4' },
                                    { offset: 1, color: '#22c55e' }
                                ])
                            }
                        },
                        { 
                            value: Math.abs(data.fundFlow.main), 
                            name: '主力资金',
                            itemStyle: { 
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: '#fbbf24' },
                                    { offset: 1, color: '#f59e0b' }
                                ])
                            }
                        }
                    ]
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 渲染股票表格
        function renderStockTable(data) {
            const tbody = document.getElementById('stockTable');
            tbody.innerHTML = data.stocks.map(s => {
                const isBull = s.change >= 0;
                const isBullInflow = s.mainInflow >= 0;
                return `
                    <tr>
                        <td>
                            <div class="stock-name">
                                <span class="stock-name-cn">${s.name}</span>
                                <span class="stock-code">${s.code}</span>
                            </div>
                        </td>
                        <td>
                            <span class="stock-price">¥${s.price.toFixed(2)}</span>
                        </td>
                        <td>
                            <span class="stock-change ${isBull ? 'bull' : 'bear'}">
                                ${isBull ? '↑' : '↓'} ${Math.abs(s.change).toFixed(2)}%
                            </span>
                        </td>
                        <td>
                            <span class="stock-volume">${s.volume}</span>
                        </td>
                        <td>
                            <span class="stock-inflow ${isBullInflow ? 'bull' : 'bear'}">
                                ${isBullInflow ? '↑' : '↓'} ¥${Math.abs(s.mainInflow).toFixed(1)}亿
                            </span>
                        </td>
                        <td>
                            <span class="stock-industry">${s.industry}</span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 更新时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('updateTime').textContent = timeStr;
        }

        // 刷新数据
        function refreshData() {
            const data = generateMockData();
            
            updateTime();
            renderIndices(data);
            renderStats(data);
            initSectorChart(data);
            initFundFlowChart(data);
            renderStockTable(data);
            
            // 添加刷新动画反馈
            const btn = document.querySelector('.btn-refresh');
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
            }, 150);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            refreshData();
            
            // 可选：自动刷新（每 5 分钟）
            // setInterval(refreshData, 5 * 60 * 1000);
        });
    </script>
</body>
</html>
