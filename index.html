<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股市场看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header h1 {
            font-size: 24px;
            color: #1a1a1a;
        }
        .update-time {
            color: #8c8c8c;
            font-size: 14px;
        }
        .btn-refresh {
            padding: 8px 16px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-refresh:hover {
            background: #40a9ff;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card-title {
            font-size: 14px;
            color: #8c8c8c;
            margin-bottom: 10px;
        }
        .card-value {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .card-change {
            font-size: 14px;
        }
        .red { color: #ff4d4f; }
        .green { color: #52c41a; }
        .gray { color: #8c8c8c; }
        
        .market-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-value {
            font-size: 36px;
            font-weight: 600;
        }
        .stat-label {
            color: #8c8c8c;
            margin-top: 5px;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-container {
            height: 400px;
        }
        .stock-table {
            width: 100%;
            border-collapse: collapse;
        }
        .stock-table th, .stock-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        .stock-table th {
            background: #fafafa;
            font-weight: 600;
            color: #8c8c8c;
            font-size: 12px;
        }
        .stock-table tr:hover {
            background: #f5f5f5;
        }
        .rank-up {
            color: #52c41a;
        }
        .rank-down {
            color: #ff4d4f;
        }
        
        @media (max-width: 1024px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .row { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .market-stats { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 A股市场看板</h1>
            <div>
                <span class="update-time">更新时间：<span id="updateTime">--:--:--</span></span>
                <button class="btn-refresh" onclick="refreshData()">🔄 刷新</button>
            </div>
        </div>
        
        <!-- 三大指数 -->
        <div class="grid">
            <div class="card">
                <div class="card-title">上证指数</div>
                <div class="card-value" id="shIndex">--</div>
                <div class="card-change" id="shChange">--</div>
            </div>
            <div class="card">
                <div class="card-title">深证成指</div>
                <div class="card-value" id="szIndex">--</div>
                <div class="card-change" id="szChange">--</div>
            </div>
            <div class="card">
                <div class="card-title">创业板指</div>
                <div class="card-value" id="cyIndex">--</div>
                <div class="card-change" id="cyChange">--</div>
            </div>
            <div class="card">
                <div class="card-title">沪深300</div>
                <div class="card-value" id="hsIndex">--</div>
                <div class="card-change" id="hsChange">--</div>
            </div>
        </div>
        
        <!-- 涨跌统计 -->
        <div class="market-stats">
            <div class="stat-box">
                <div class="stat-value red" id="upCount">--</div>
                <div class="stat-label">上涨家数</div>
            </div>
            <div class="stat-box">
                <div class="stat-value gray" id="flatCount">--</div>
                <div class="stat-label">平盘家数</div>
            </div>
            <div class="stat-box">
                <div class="stat-value green" id="downCount">--</div>
                <div class="stat-label">下跌家数</div>
            </div>
        </div>
        
        <!-- 板块排行和资金流向 -->
        <div class="row">
            <div class="card">
                <div class="card-title">📊 板块涨幅榜 TOP10</div>
                <div id="sectorChart" class="chart-container"></div>
            </div>
            <div class="card">
                <div class="card-title">💰 资金流向</div>
                <div id="fundFlowChart" class="chart-container"></div>
            </div>
        </div>
        
        <!-- 重要股票监控 -->
        <div class="card">
            <div class="card-title">⭐ 重要股票监控</div>
            <table class="stock-table">
                <thead>
                    <tr>
                        <th>股票</th>
                        <th>价格</th>
                        <th>涨跌幅</th>
                        <th>成交量</th>
                        <th>主力净流入</th>
                        <th>行业</th>
                    </tr>
                </thead>
                <tbody id="stockTable">
                    <tr><td colspan="6" style="text-align:center;">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        // 模拟数据（实际使用TuShare API替换）
        function generateMockData() {
            return {
                indices: {
                    sh: { value: 3420.25, change: 1.23, pct: 0.04 },
                    sz: { value: 11565.82, change: -45.67, pct: -0.39 },
                    cy: { value: 2356.31, change: 28.45, pct: 1.22 },
                    hs: { value: 4321.56, change: 12.34, pct: 0.29 }
                },
                stats: {
                    up: Math.floor(Math.random() * 2000) + 1500,
                    flat: Math.floor(Math.random() * 500) + 200,
                    down: Math.floor(Math.random() * 1500) + 1000
                },
                sectors: [
                    { name: '半导体', change: 3.25 },
                    { name: '人工智能', change: 2.88 },
                    { name: '光伏设备', change: 2.45 },
                    { name: '汽车整车', change: 1.98 },
                    { name: '医疗器械', change: 1.56 },
                    { name: '软件开发', change: 1.32 },
                    { name: '电池', change: 0.98 },
                    { name: '通信设备', change: 0.76 },
                    { name: '券商', change: 0.54 },
                    { name: '家电', change: 0.32 }
                ],
                fundFlow: {
                    north: Math.floor(Math.random() * 500) + 100,
                    south: Math.floor(Math.random() * 200) + 50,
                    main: Math.floor(Math.random() * 800) - 200
                },
                stocks: [
                    { name: '宁德时代', code: '300750', price: 412.56, change: 2.34, volume: '125.6亿', mainInflow: '8.5亿', industry: '电池' },
                    { name: '比亚迪', code: '002594', price: 268.45, change: -1.23, volume: '89.2亿', mainInflow: '-3.2亿', industry: '汽车' },
                    { name: '中芯国际', code: '688981', price: 52.38, change: 4.56, volume: '156.8亿', mainInflow: '12.3亿', industry: '半导体' },
                    { name: '五粮液', code: '000858', price: 168.92, change: 0.87, volume: '45.6亿', mainInflow: '2.1亿', industry: '白酒' },
                    { name: '招商银行', code: '600036', price: 38.45, change: -0.56, volume: '32.1亿', mainInflow: '-1.8亿', industry: '银行' },
                    { name: '中信证券', code: '600030', price: 28.92, change: 1.23, volume: '78.5亿', mainInflow: '5.6亿', industry: '券商' },
                    { name: '紫光国微', code: '002049', price: 98.76, change: 3.45, volume: '56.3亿', mainInflow: '4.2亿', industry: '半导体' },
                    { name: '隆基绿能', code: '601012', price: 32.45, change: 1.89, volume: '67.8亿', mainInflow: '3.5亿', industry: '光伏' }
                ]
            };
        }
        
        function formatNumber(num) {
            return num.toLocaleString('zh-CN');
        }
        
        function formatChange(num) {
            const sign = num >= 0 ? '+' : '';
            return sign + num.toFixed(2) + '%';
        }
        
        function renderIndices(data) {
            const indices = data.indices;
            document.getElementById('shIndex').textContent = indices.sh.value.toFixed(2);
            document.getElementById('shIndex').className = 'card-value ' + (indices.sh.change >= 0 ? 'red' : 'green');
            document.getElementById('shChange').textContent = (indices.sh.change >= 0 ? '↑' : '↓') + Math.abs(indices.sh.change).toFixed(2) + ' (' + formatChange(indices.sh.pct) + ')';
            document.getElementById('shChange').className = 'card-change ' + (indices.sh.change >= 0 ? 'red' : 'green');
            
            document.getElementById('szIndex').textContent = indices.sz.value.toFixed(2);
            document.getElementById('szIndex').className = 'card-value ' + (indices.sz.change >= 0 ? 'red' : 'green');
            document.getElementById('szChange').textContent = (indices.sz.change >= 0 ? '↑' : '↓') + Math.abs(indices.sz.change).toFixed(2) + ' (' + formatChange(indices.sz.pct) + ')';
            document.getElementById('szChange').className = 'card-change ' + (indices.sz.change >= 0 ? 'red' : 'green');
            
            document.getElementById('cyIndex').textContent = indices.cy.value.toFixed(2);
            document.getElementById('cyIndex').className = 'card-value ' + (indices.cy.change >= 0 ? 'red' : 'green');
            document.getElementById('cyChange').textContent = (indices.cy.change >= 0 ? '↑' : '↓') + Math.abs(indices.cy.change).toFixed(2) + ' (' + formatChange(indices.cy.pct) + ')';
            document.getElementById('cyChange').className = 'card-change ' + (indices.cy.change >= 0 ? 'red' : 'green');
            
            document.getElementById('hsIndex').textContent = indices.hs.value.toFixed(2);
            document.getElementById('hsIndex').className = 'card-value ' + (indices.hs.change >= 0 ? 'red' : 'green');
            document.getElementById('hsChange').textContent = (indices.hs.change >= 0 ? '↑' : '↓') + Math.abs(indices.hs.change).toFixed(2) + ' (' + formatChange(indices.hs.pct) + ')';
            document.getElementById('hsChange').className = 'card-change ' + (indices.hs.change >= 0 ? 'red' : 'green');
        }
        
        function renderStats(data) {
            document.getElementById('upCount').textContent = formatNumber(data.stats.up);
            document.getElementById('flatCount').textContent = formatNumber(data.stats.flat);
            document.getElementById('downCount').textContent = formatNumber(data.stats.down);
        }
        
        function initSectorChart(data) {
            const chart = echarts.init(document.getElementById('sectorChart'));
            const chartData = data.sectors.map(s => ({
                name: s.name,
                value: s.change
            })).reverse();
            
            const option = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'value', axisLabel: { formatter: '{value}%' } },
                yAxis: { type: 'category', data: chartData.map(d => d.name) },
                series: [{
                    type: 'bar',
                    data: chartData,
                    itemStyle: {
                        color: function(params) {
                            return params.value >= 0 ? '#52c41a' : '#ff4d4f';
                        }
                    }
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
        
        function initFundFlowChart(data) {
            const chart = echarts.init(document.getElementById('fundFlowChart'));
            const option = {
                tooltip: { trigger: 'item', formatter: '{b}: {c}亿' },
                legend: { bottom: 0 },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: [
                        { value: data.fundFlow.north, name: '北向资金' },
                        { value: data.fundFlow.south, name: '南向资金' },
                        { value: Math.abs(data.fundFlow.main), name: '主力资金' }
                    ],
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
        
        function renderStockTable(data) {
            const tbody = document.getElementById('stockTable');
            tbody.innerHTML = data.stocks.map(s => `
                <tr>
                    <td><strong>${s.name}</strong><br><span style="color:#8c8c8c;font-size:12px;">${s.code}</span></td>
                    <td>${s.price.toFixed(2)}</td>
                    <td class="${s.change >= 0 ? 'rank-up' : 'rank-down'}">${formatChange(s.change)}</td>
                    <td>${s.volume}</td>
                    <td class="${parseFloat(s.mainInflow) >= 0 ? 'rank-up' : 'rank-down'}">${s.mainInflow}</td>
                    <td>${s.industry}</td>
                </tr>
            `).join('');
        }
        
        function refreshData() {
            const data = generateMockData();
            
            // 更新时间
            const now = new Date();
            document.getElementById('updateTime').textContent = 
                now.getHours().toString().padStart(2,'0') + ':' + 
                now.getMinutes().toString().padStart(2,'0') + ':' + 
                now.getSeconds().toString().padStart(2,'0');
            
            renderIndices(data);
            renderStats(data);
            initSectorChart(data);
            initFundFlowChart(data);
            renderStockTable(data);
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', refreshData);
    </script>
</body>
</html>
