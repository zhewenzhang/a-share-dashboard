<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资组合 | A 股资金追踪系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #09090b;
            --sidebar-hover: #18181b;
            --sidebar-active: rgba(99, 102, 241, 0.15);
            --sidebar-border: rgba(255, 255, 255, 0.06);
            --sidebar-text: #a1a1aa;
            --sidebar-text-active: #ffffff;
            
            --main-bg: #0c0c0e;
            --card-bg: #131316;
            --card-border: rgba(255, 255, 255, 0.04);
            --card-hover: rgba(255, 255, 255, 0.02);
            
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            
            --bull: #f43f5e;
            --bear: #10b981;
            --warning: #f59e0b;
            
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --glow: 0 0 40px rgba(99, 102, 241, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--main-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; right: -20%;
            width: 800px; height: 800px;
            background: radial-gradient(ellipse, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        .app-container { display: flex; min-height: 100vh; position: relative; z-index: 1; }

        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0; top: 0; bottom: 0;
            overflow-y: auto;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px 24px;
            border-bottom: 1px solid var(--sidebar-border);
            margin-bottom: 24px;
            cursor: pointer;
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: var(--accent-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--glow);
        }

        .logo-text { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
        .logo-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .nav-section { margin-bottom: 28px; }
        .nav-section-title {
            font-size: 11px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.8px;
            padding: 0 12px; margin-bottom: 10px;
        }

        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; border-radius: 10px;
            color: var(--sidebar-text);
            cursor: pointer; transition: all 0.2s ease;
            margin-bottom: 4px; border: none;
            background: transparent; width: 100%;
            text-align: left; font-size: 14px; font-weight: 500;
        }

        .nav-item:hover { background: var(--sidebar-hover); color: var(--text-primary); }
        .nav-item.active { background: var(--sidebar-active); color: var(--text-primary); }
        .nav-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .nav-badge {
            margin-left: auto; padding: 2px 8px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 6px; font-size: 11px;
            font-weight: 600; color: var(--accent-primary);
        }

        .sidebar-footer {
            margin-top: auto; padding-top: 20px;
            border-top: 1px solid var(--sidebar-border);
        }

        .version-tag {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 12px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            font-size: 12px; color: var(--accent-primary);
        }

        /* 主内容区 */
        .main-content {
            flex: 1; margin-left: 260px;
            padding: 32px 40px; min-height: 100vh;
        }

        .top-bar {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--card-border);
        }

        .page-header h1 { font-size: 28px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; }
        .page-header p { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }

        .top-actions { display: flex; align-items: center; gap: 12px; }

        .btn-icon {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            cursor: pointer; color: var(--text-secondary);
            transition: all 0.2s ease; font-size: 18px;
        }

        .btn-icon:hover {
            background: var(--card-hover);
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        .btn-primary {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 20px;
            background: var(--accent-gradient);
            border: none; border-radius: 10px;
            color: white; font-weight: 600;
            font-size: 14px; cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-weight: 600; font-size: 14px;
            cursor: pointer; transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background: var(--card-hover);
            border-color: var(--accent-primary);
        }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow-md);
        }

        .card-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px; font-weight: 600;
            color: var(--text-primary);
            display: flex; align-items: center; gap: 10px;
        }

        .card-actions { display: flex; gap: 8px; }

        .btn-ghost {
            padding: 8px 14px;
            background: transparent;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer; font-size: 13px;
            transition: all 0.2s ease;
        }

        .btn-ghost:hover {
            background: var(--card-hover);
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        /* 统计卡片网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px; margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -1px;
        }

        .stat-change {
            display: flex; align-items: center; gap: 6px;
            margin-top: 8px; font-size: 13px;
        }

        .stat-change.bull { color: var(--bull); }
        .stat-change.bear { color: var(--bear); }

        /* 内容网格 */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px; margin-bottom: 24px;
        }

        .chart-container { height: 350px; }

        /* 表格 */
        .table-container { overflow-x: auto; }

        .data-table { width: 100%; border-collapse: collapse; }

        .data-table th {
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--card-border);
        }

        .data-table td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 14px;
        }

        .data-table tbody tr { cursor: pointer; transition: all 0.2s ease; }
        .data-table tbody tr:hover { background: var(--card-hover); }

        .stock-name-cell { display: flex; flex-direction: column; gap: 4px; }
        .stock-name-cn { font-weight: 600; color: var(--text-primary); }
        .stock-code { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px; font-weight: 600;
        }

        .tag-strong-buy { background: rgba(16, 185, 129, 0.15); color: var(--bear); }
        .tag-buy { background: rgba(99, 102, 241, 0.15); color: var(--accent-primary); }
        .tag-watch { background: rgba(113, 113, 122, 0.15); color: var(--text-muted); }
        .tag-sell { background: rgba(244, 63, 94, 0.15); color: var(--bull); }

        .change-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; border-radius: 6px;
            font-size: 13px; font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .change-badge.bull { background: rgba(244, 63, 94, 0.15); color: var(--bull); }
        .change-badge.bear { background: rgba(16, 185, 129, 0.15); color: var(--bear); }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex; align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal {
            background: #18181b;
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            transform: translateY(20px);
            transition: all 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .modal-overlay.active .modal { transform: translateY(0); }

        .modal-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 24px;
        }

        .modal-title { font-size: 20px; font-weight: 700; color: var(--text-primary); }

        .modal-close {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            cursor: pointer; color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .modal-close:hover { background: var(--card-hover); color: var(--text-primary); }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 13px; font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .form-actions {
            display: flex; gap: 12px; margin-top: 28px;
        }

        .form-actions .btn-primary,
        .form-actions .btn-secondary { flex: 1; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px; right: 24px;
            padding: 14px 20px;
            background: #18181b;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: var(--shadow-lg);
            transform: translateY(100px); opacity: 0;
            transition: all 0.3s ease;
            z-index: 1100;
        }

        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-icon { font-size: 18px; }
        .toast-message { font-size: 14px; color: var(--text-primary); }

        /* 风险指标 */
        .risk-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .risk-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
        }

        .risk-label { font-size: 13px; color: var(--text-secondary); }
        .risk-value { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; }
        .risk-value.good { color: var(--bear); }
        .risk-value.warning { color: var(--warning); }
        .risk-value.bad { color: var(--bull); }

        /* 预警列表 */
        .alert-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .alert-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            border-left: 3px solid var(--warning);
        }

        .alert-item.critical { border-left-color: var(--bull); }
        .alert-item.info { border-left-color: var(--accent-primary); }

        .alert-icon { font-size: 18px; }
        .alert-content { flex: 1; }
        .alert-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .alert-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .alert-time { font-size: 11px; color: var(--text-muted); }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state-title { font-size: 18px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
        .empty-state-desc { font-size: 14px; margin-bottom: 20px; }

        /* 响应式 */
        @media (max-width: 1400px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .content-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); z-index: 100; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-menu-btn { display: flex; }
        }

        .mobile-menu-btn {
            display: none;
            width: 40px; height: 40px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            cursor: pointer; color: var(--text-secondary);
            font-size: 20px;
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo" onclick="window.location.href='index.html'">
                <div class="logo-icon">📊</div>
                <div>
                    <div class="logo-text">资金追踪</div>
                    <div class="logo-subtitle">Capital Flow</div>
                </div>
            </div>

            <nav class="nav-section">
                <div class="nav-section-title">主菜单</div>
                <button class="nav-item" onclick="window.location.href='index.html'">
                    <span class="nav-icon">🏠</span>
                    <span>数据看板</span>
                </button>
                <button class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span>资金分析</span>
                    <span class="nav-badge">NEW</span>
                </button>
                <button class="nav-item active">
                    <span class="nav-icon">💼</span>
                    <span>投资组合</span>
                </button>
            </nav>

            <nav class="nav-section">
                <div class="nav-section-title">工具</div>
                <button class="nav-item">
                    <span class="nav-icon">🧪</span>
                    <span>策略回测</span>
                </button>
                <button class="nav-item">
                    <span class="nav-icon">🎯</span>
                    <span>模拟交易</span>
                </button>
            </nav>

            <nav class="nav-section">
                <div class="nav-section-title">系统</div>
                <button class="nav-item" onclick="openSettings()">
                    <span class="nav-icon">⚙️</span>
                    <span>设置</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="version-tag">
                    <span>🚀</span>
                    <span>v2.1.0</span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <div class="top-bar">
                <div class="page-header">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()" style="margin-bottom: 12px;">☰</button>
                    <h1>💼 投资组合</h1>
                    <p>管理你的持仓，追踪盈亏表现</p>
                </div>
                <div class="top-actions">
                    <button class="btn-secondary" onclick="exportPortfolio()">
                        <span>📊</span>
                        <span>导出</span>
                    </button>
                    <button class="btn-primary" onclick="openAddPosition()">
                        <span>➕</span>
                        <span>添加持仓</span>
                    </button>
                </div>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">总资产</div>
                    <div class="stat-value" id="totalValue">¥0.00</div>
                    <div class="stat-change" id="totalValueChange">
                        <span>--</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">总盈亏</div>
                    <div class="stat-value" id="totalProfit">¥0.00</div>
                    <div class="stat-change" id="totalProfitChange">
                        <span>--</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">收益率</div>
                    <div class="stat-value" id="totalReturn">0.00%</div>
                    <div class="stat-change" id="totalReturnChange">
                        <span>--</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">持仓数量</div>
                    <div class="stat-value" id="positionCount">0</div>
                    <div class="stat-change" style="color: var(--text-secondary);">
                        <span>只股票</span>
                    </div>
                </div>
            </div>

            <!-- 内容网格 -->
            <div class="content-grid">
                <!-- 持仓列表 -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <span>📋</span>
                            持仓明细
                        </div>
                        <div class="card-actions">
                            <button class="btn-ghost" onclick="refreshPrices()">🔄 刷新价格</button>
                        </div>
                    </div>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>股票</th>
                                    <th>持仓数量</th>
                                    <th>成本价</th>
                                    <th>当前价</th>
                                    <th>市值</th>
                                    <th>盈亏</th>
                                    <th>收益率</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="positionTable">
                                <tr>
                                    <td colspan="8" class="empty-state">
                                        <div class="empty-state-icon">💼</div>
                                        <div class="empty-state-title">暂无持仓</div>
                                        <div class="empty-state-desc">点击右上角"添加持仓"开始投资</div>
                                        <button class="btn-primary" onclick="openAddPosition()">
                                            <span>➕</span>
                                            <span>添加持仓</span>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 右侧栏 -->
                <div style="display: flex; flex-direction: column; gap: 24px;">
                    <!-- 风险指标 -->
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">
                                <span>⚠️</span>
                                风险指标
                            </div>
                        </div>
                        <div class="risk-grid">
                            <div class="risk-item">
                                <span class="risk-label">最大回撤</span>
                                <span class="risk-value good" id="maxDrawdown">--</span>
                            </div>
                            <div class="risk-item">
                                <span class="risk-label">夏普比率</span>
                                <span class="risk-value" id="sharpeRatio">--</span>
                            </div>
                            <div class="risk-item">
                                <span class="risk-label">波动率</span>
                                <span class="risk-value" id="volatility">--</span>
                            </div>
                            <div class="risk-item">
                                <span class="risk-label">胜率</span>
                                <span class="risk-value" id="winRate">--</span>
                            </div>
                        </div>
                    </div>

                    <!-- 预警通知 -->
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">
                                <span>🔔</span>
                                预警通知
                            </div>
                            <button class="btn-ghost" onclick="clearAlerts()">清空</button>
                        </div>
                        <div class="alert-list" id="alertList">
                            <div class="empty-state" style="padding: 20px;">
                                <div style="font-size: 14px; color: var(--text-secondary);">暂无预警</div>
                            </div>
                        </div>
                    </div>

                    <!-- 行业分布 -->
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">
                                <span>📊</span>
                                行业分布
                            </div>
                        </div>
                        <div id="industryChart" class="chart-container" style="height: 250px;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 添加持仓弹窗 -->
    <div class="modal-overlay" id="addModal" onclick="closeAddModal(event)">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">➕ 添加持仓</h2>
                <button class="modal-close" onclick="closeAddModal()">✕</button>
            </div>
            <div class="form-group">
                <label class="form-label">股票代码</label>
                <input type="text" class="form-input" id="stockCode" placeholder="如：300750.SZ">
            </div>
            <div class="form-group">
                <label class="form-label">股票名称</label>
                <input type="text" class="form-input" id="stockName" placeholder="如：宁德时代">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">持仓数量</label>
                    <input type="number" class="form-input" id="positionShares" placeholder="股数">
                </div>
                <div class="form-group">
                    <label class="form-label">成本价</label>
                    <input type="number" class="form-input" id="costPrice" placeholder="元/股" step="0.01">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">所属行业</label>
                <select class="form-input" id="industry">
                    <option value="电池">电池</option>
                    <option value="半导体">半导体</option>
                    <option value="白酒">白酒</option>
                    <option value="汽车">汽车</option>
                    <option value="券商">券商</option>
                    <option value="光伏">光伏</option>
                    <option value="银行">银行</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-actions">
                <button class="btn-secondary" onclick="closeAddModal()">取消</button>
                <button class="btn-primary" onclick="savePosition()">💾 保存</button>
            </div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal" onclick="closeSettings(event)">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">⚙️ 系统设置</h2>
                <button class="modal-close" onclick="closeSettings()">✕</button>
            </div>
            <div class="form-group">
                <label class="form-label">TuShare API Token</label>
                <input type="text" class="form-input" id="tushareToken" placeholder="请输入你的 TuShare Token">
            </div>
            <div class="form-actions">
                <button class="btn-secondary" onclick="closeSettings()">取消</button>
                <button class="btn-primary" onclick="saveSettings()" style="flex:1;">💾 保存</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon">✅</span>
        <span class="toast-message" id="toastMessage">操作成功</span>
    </div>

    <script>
        // ============== 全局状态 ==============
        let positions = JSON.parse(localStorage.getItem('portfolio_positions') || '[]');
        let alerts = JSON.parse(localStorage.getItem('portfolio_alerts') || '[]');
        let config = {
            tushareToken: localStorage.getItem('tushareToken') || ''
        };

        // 模拟当前价格
        const mockPrices = {
            '300750.SZ': { price: 412.56, change: 2.34 },
            '688981.SH': { price: 52.38, change: 4.56 },
            '000858.SZ': { price: 168.92, change: 0.87 },
            '002594.SZ': { price: 268.45, change: -1.23 },
            '600030.SH': { price: 28.92, change: 1.23 },
            '601012.SH': { price: 32.45, change: 1.89 },
            '000001.SZ': { price: 14.25, change: -0.56 },
            '600036.SH': { price: 38.45, change: -0.32 }
        };

        // ============== 初始化 ==============
        document.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            renderPositions();
            renderAlerts();
            renderIndustryChart();
            updateStats();
        });

        // ============== 配置管理 ==============
        function loadConfig() {
            document.getElementById('tushareToken').value = config.tushareToken;
        }

        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings(event) {
            if (!event || event.target === document.getElementById('settingsModal')) {
                document.getElementById('settingsModal').classList.remove('active');
            }
        }

        function saveSettings() {
            config.tushareToken = document.getElementById('tushareToken').value.trim();
            localStorage.setItem('tushareToken', config.tushareToken);
            closeSettings();
            showToast('✅ 设置已保存', 'success');
        }

        // ============== 持仓管理 ==============
        function openAddPosition() {
            document.getElementById('addModal').classList.add('active');
        }

        function closeAddModal(event) {
            if (!event || event.target === document.getElementById('addModal')) {
                document.getElementById('addModal').classList.remove('active');
                // 清空表单
                document.getElementById('stockCode').value = '';
                document.getElementById('stockName').value = '';
                document.getElementById('positionShares').value = '';
                document.getElementById('costPrice').value = '';
            }
        }

        function savePosition() {
            const code = document.getElementById('stockCode').value.trim();
            const name = document.getElementById('stockName').value.trim();
            const shares = parseFloat(document.getElementById('positionShares').value);
            const costPrice = parseFloat(document.getElementById('costPrice').value);
            const industry = document.getElementById('industry').value;

            if (!code || !name || !shares || !costPrice) {
                showToast('❌ 请填写完整信息', 'error');
                return;
            }

            const position = {
                id: Date.now(),
                code,
                name,
                shares,
                costPrice,
                industry,
                addDate: new Date().toISOString()
            };

            positions.push(position);
            savePositions();
            closeAddModal();
            renderPositions();
            updateStats();
            renderIndustryChart();
            showToast('✅ 持仓已添加', 'success');

            // 添加预警
            addAlert('info', `${name} 已添加到持仓`, '新建持仓');
        }

        function savePositions() {
            localStorage.setItem('portfolio_positions', JSON.stringify(positions));
        }

        function deletePosition(id) {
            const pos = positions.find(p => p.id === id);
            positions = positions.filter(p => p.id !== id);
            savePositions();
            renderPositions();
            updateStats();
            renderIndustryChart();
            showToast('✅ 持仓已删除', 'success');
            addAlert('info', `${pos?.name} 已从持仓移除`, '删除持仓');
        }

        // ============== 渲染函数 ==============
        function renderPositions() {
            const tbody = document.getElementById('positionTable');
            
            if (positions.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="empty-state">
                            <div class="empty-state-icon">💼</div>
                            <div class="empty-state-title">暂无持仓</div>
                            <div class="empty-state-desc">点击右上角"添加持仓"开始投资</div>
                            <button class="btn-primary" onclick="openAddPosition()">
                                <span>➕</span>
                                <span>添加持仓</span>
                            </button>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = positions.map(pos => {
                const currentPrice = mockPrices[pos.code]?.price || pos.costPrice;
                const change = mockPrices[pos.code]?.change || 0;
                const marketValue = currentPrice * pos.shares;
                const costValue = pos.costPrice * pos.shares;
                const profit = marketValue - costValue;
                const returnRate = (profit / costValue) * 100;

                return `
                    <tr>
                        <td>
                            <div class="stock-name-cell">
                                <span class="stock-name-cn">${pos.name}</span>
                                <span class="stock-code">${pos.code}</span>
                            </div>
                        </td>
                        <td>${pos.shares.toLocaleString()}</td>
                        <td style="font-family:'JetBrains Mono';">¥${pos.costPrice.toFixed(2)}</td>
                        <td style="font-family:'JetBrains Mono';">
                            ¥${currentPrice.toFixed(2)}
                            <span class="change-badge ${change >= 0 ? 'bull' : 'bear'}" style="margin-left:8px;">
                                ${change >= 0 ? '↑' : '↓'} ${Math.abs(change).toFixed(2)}%
                            </span>
                        </td>
                        <td style="font-family:'JetBrains Mono';">¥${formatNumber(marketValue)}</td>
                        <td style="font-family:'JetBrains Mono';color:${profit >= 0 ? 'var(--bear)' : 'var(--bull)'}">
                            ${profit >= 0 ? '+' : ''}${formatNumber(profit)}
                        </td>
                        <td>
                            <span class="change-badge ${returnRate >= 0 ? 'bull' : 'bear'}">
                                ${returnRate >= 0 ? '↑' : '↓'} ${Math.abs(returnRate).toFixed(2)}%
                            </span>
                        </td>
                        <td>
                            <button class="btn-ghost" onclick="deletePosition(${pos.id})" style="padding:6px 10px;font-size:12px;">
                                🗑️ 删除
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateStats() {
            let totalCost = 0;
            let totalMarket = 0;
            let profitCount = 0;

            positions.forEach(pos => {
                const currentPrice = mockPrices[pos.code]?.price || pos.costPrice;
                const costValue = pos.costPrice * pos.shares;
                const marketValue = currentPrice * pos.shares;
                totalCost += costValue;
                totalMarket += marketValue;
                if (marketValue > costValue) profitCount++;
            });

            const totalProfit = totalMarket - totalCost;
            const totalReturn = totalCost > 0 ? (totalProfit / totalCost) * 100 : 0;

            document.getElementById('totalValue').textContent = '¥' + formatNumber(totalMarket);
            document.getElementById('totalProfit').textContent = (totalProfit >= 0 ? '+' : '') + '¥' + formatNumber(totalProfit);
            document.getElementById('totalProfit').style.color = totalProfit >= 0 ? 'var(--bear)' : 'var(--bull)';
            document.getElementById('totalReturn').textContent = (totalReturn >= 0 ? '+' : '') + totalReturn.toFixed(2) + '%';
            document.getElementById('totalReturn').style.color = totalReturn >= 0 ? 'var(--bear)' : 'var(--bull)';
            document.getElementById('positionCount').textContent = positions.length;

            // 更新变化
            const changeHtml = totalProfit >= 0 ? '↑ 今日+' : '↓ 今日';
            document.getElementById('totalValueChange').innerHTML = changeHtml + '0.5%';
            document.getElementById('totalProfitChange').innerHTML = changeHtml + '1.2%';
            document.getElementById('totalReturnChange').innerHTML = changeHtml + '0.8%';

            // 更新风险指标
            updateRiskMetrics(totalReturn);
        }

        function updateRiskMetrics(totalReturn) {
            // 模拟风险指标
            const maxDrawdown = (Math.random() * 15 + 5).toFixed(2) + '%';
            const sharpeRatio = (Math.random() * 2 + 0.5).toFixed(2);
            const volatility = (Math.random() * 20 + 10).toFixed(2) + '%';
            const winRate = positions.length > 0 ? ((positions.filter(p => {
                const currentPrice = mockPrices[p.code]?.price || p.costPrice;
                return currentPrice > p.costPrice;
            }).length / positions.length) * 100).toFixed(1) + '%' : '--';

            document.getElementById('maxDrawdown').textContent = '-' + maxDrawdown;
            document.getElementById('maxDrawdown').className = 'risk-value good';
            document.getElementById('sharpeRatio').textContent = sharpeRatio;
            document.getElementById('volatility').textContent = volatility;
            document.getElementById('winRate').textContent = winRate;
        }

        function renderIndustryChart() {
            const chart = echarts.init(document.getElementById('industryChart'), 'dark', {
                backgroundColor: 'transparent'
            });

            const industryData = {};
            positions.forEach(pos => {
                const currentPrice = mockPrices[pos.code]?.price || pos.costPrice;
                const value = currentPrice * pos.shares;
                industryData[pos.industry] = (industryData[pos.industry] || 0) + value;
            });

            const data = Object.entries(industryData).map(([name, value]) => ({
                name, value
            }));

            const option = {
                tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['50%', '50%'],
                    data: data,
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    },
                    label: { color: '#a1a1aa' },
                    itemStyle: {
                        color: (params) => {
                            const colors = ['#6366f1', '#8b5cf6', '#f43f5e', '#10b981', '#f59e0b', '#06b6d4', '#ec4899'];
                            return colors[params.dataIndex % colors.length];
                        }
                    }
                }]
            };

            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // ============== 预警系统 ==============
        function addAlert(type, title, desc) {
            const alert = {
                id: Date.now(),
                type,
                title,
                desc,
                time: new Date().toLocaleString('zh-CN')
            };
            alerts.unshift(alert);
            if (alerts.length > 10) alerts = alerts.slice(0, 10);
            localStorage.setItem('portfolio_alerts', JSON.stringify(alerts));
            renderAlerts();
        }

        function renderAlerts() {
            const container = document.getElementById('alertList');
            
            if (alerts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding: 20px;">
                        <div style="font-size: 14px; color: var(--text-secondary);">暂无预警</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = alerts.map(alert => `
                <div class="alert-item ${alert.type === 'critical' ? 'critical' : alert.type === 'info' ? 'info' : ''}">
                    <span class="alert-icon">${alert.type === 'critical' ? '🚨' : alert.type === 'warning' ? '⚠️' : 'ℹ️'}</span>
                    <div class="alert-content">
                        <div class="alert-title">${alert.title}</div>
                        <div class="alert-desc">${alert.desc}</div>
                    </div>
                    <span class="alert-time">${alert.time}</span>
                </div>
            `).join('');
        }

        function clearAlerts() {
            alerts = [];
            localStorage.setItem('portfolio_alerts', JSON.stringify(alerts));
            renderAlerts();
            showToast('✅ 预警已清空', 'success');
        }

        function checkAlerts() {
            // 检查预警条件
            positions.forEach(pos => {
                const currentPrice = mockPrices[pos.code]?.price || pos.costPrice;
                const change = ((currentPrice - pos.costPrice) / pos.costPrice) * 100;
                
                // 跌幅超过 10% 预警
                if (change < -10) {
                    addAlert('critical', `${pos.name} 跌幅超过 10%`, `当前收益率：${change.toFixed(2)}%`);
                }
                // 涨幅超过 20% 止盈提醒
                else if (change > 20) {
                    addAlert('warning', `${pos.name} 涨幅超过 20%`, `考虑是否止盈？当前收益率：${change.toFixed(2)}%`);
                }
            });
        }

        // ============== 工具函数 ==============
        function formatNumber(num) {
            return num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function refreshPrices() {
            renderPositions();
            updateStats();
            showToast('✅ 价格已更新', 'success');
        }

        function exportPortfolio() {
            const headers = ['股票代码','股票名称','持仓数量','成本价','当前价','市值','盈亏','收益率','行业'];
            const rows = positions.map(pos => {
                const currentPrice = mockPrices[pos.code]?.price || pos.costPrice;
                const marketValue = currentPrice * pos.shares;
                const profit = marketValue - (pos.costPrice * pos.shares);
                const returnRate = ((marketValue - pos.costPrice * pos.shares) / (pos.costPrice * pos.shares)) * 100;
                return [pos.code, pos.name, pos.shares, pos.costPrice.toFixed(2), currentPrice.toFixed(2), marketValue.toFixed(2), profit.toFixed(2), returnRate.toFixed(2) + '%', pos.industry];
            });
            
            const csv = '\ufeff' + [headers, ...rows].map(r => r.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `投资组合_${new Date().toLocaleDateString()}.csv`;
            a.click();
            showToast('📊 组合已导出', 'success');
        }

        function showToast(message, type = 'success') {
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            document.getElementById('toastIcon').textContent = icons[type];
            document.getElementById('toastMessage').textContent = message;
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // 定期检查预警
        setInterval(checkAlerts, 60000);
    </script>
</body>
</html>
